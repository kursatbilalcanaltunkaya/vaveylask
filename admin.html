<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Paneli - Vaveyla Turnuva</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #8B0000 0%, #4a0000 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .login-container {
            max-width: 400px;
            margin: 100px auto;
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 50px rgba(0,0,0,0.3);
        }

        .login-container h2 {
            color: #8B0000;
            text-align: center;
            margin-bottom: 30px;
        }

        .admin-container {
            display: none;
            max-width: 1200px;
            margin: 0 auto;
        }

        .admin-header {
            background: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .admin-header h1 {
            color: #8B0000;
        }

        .admin-content {
            background: white;
            padding: 30px;
            border-radius: 15px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #8B0000;
        }

        button {
            width: 100%;
            padding: 15px;
            background: #8B0000;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #6B0000;
        }

        .btn-small {
            width: auto;
            padding: 8px 15px;
            font-size: 0.9em;
            display: inline-block;
            margin: 5px;
        }

        .btn-secondary {
            background: #FFD700;
            color: #8B0000;
        }

        .btn-danger {
            background: #dc3545;
        }

        .match-item {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .success {
            background: #28a745;
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
        }

        .error {
            color: #dc3545;
            text-align: center;
            margin-top: 10px;
        }

        .back-link {
            color: #FFD700;
            text-decoration: none;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tabs button {
            flex: 1;
            background: #ddd;
            color: #333;
        }

        .tabs button.active {
            background: #8B0000;
            color: white;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .athlete-item {
            background: white;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .attendance-item {
            background: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .attendance-toggle {
            display: flex;
            gap: 10px;
        }

        .attendance-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 3px solid #ddd;
            background: white;
            font-size: 1.5em;
            cursor: pointer;
            transition: all 0.3s;
        }

        .attendance-btn.present {
            border-color: #28a745;
            background: #28a745;
            color: white;
        }

        .attendance-btn.absent {
            border-color: #dc3545;
            background: #dc3545;
            color: white;
        }

        .stat-card {
            background: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .stat-number {
            font-size: 2em;
            font-weight: bold;
            color: #8B0000;
        }

        .history-card {
            background: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .history-card h4 {
            color: #8B0000;
            margin-bottom: 10px;
        }

        .progress-bar {
            background: #eee;
            height: 20px;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 5px;
        }

        .progress-fill {
            background: #28a745;
            height: 100%;
            transition: width 0.3s;
        }

        /* Yoklama Mobil Stiller */
        .yoklama-athlete-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .yoklama-athlete-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .yoklama-athlete-name {
            font-size: 1.2em;
            font-weight: 600;
            color: #333;
        }

        .yoklama-buttons {
            display: flex;
            gap: 12px;
        }

        .yoklama-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 3px solid #ddd;
            background: white;
            font-size: 1.8em;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .yoklama-btn:active {
            transform: scale(0.9);
        }

        .yoklama-btn.present {
            border-color: #28a745;
            background: #28a745;
            color: white;
        }

        .yoklama-btn.absent {
            border-color: #dc3545;
            background: #dc3545;
            color: white;
        }

        .yoklama-summary {
            background: linear-gradient(135deg, #FFD700, #FFC700);
            color: #8B0000;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 20px;
        }

        .yoklama-summary-number {
            font-size: 2.5em;
            font-weight: bold;
        }

        .yoklama-athlete-status {
            margin-top: 8px;
            font-size: 0.95em;
            color: #666;
        }

        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }
            .match-item {
                flex-direction: column;
                align-items: flex-start;
            }
            .yoklama-athlete-header {
                flex-direction: column;
                align-items: flex-start;
            }
            .yoklama-buttons {
                width: 100%;
                justify-content: center;
            }
            /* Genel tablo mobil */
            #yoklama-date-view-section > div > div {
                grid-template-columns: 1fr !important;
            }
        }
    </style>
</head>
<body>
    <!-- Login -->
    <div id="login-screen" class="login-container">
        <h2>🔐 Admin Girişi</h2>
        <form id="login-form">
            <div class="form-group">
                <label>Şifre</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit">Giriş Yap</button>
            <div id="login-error" class="error"></div>
        </form>
        <a href="index.html" style="display:block;text-align:center;margin-top:20px;color:#666;">← Ana Sayfaya Dön</a>
    </div>

    <!-- Admin Panel -->
    <div id="admin-panel" class="admin-container">
        <div class="admin-header">
            <div>
                <h1>🏐 Admin Paneli</h1>
                <a href="index.html" class="back-link">← Turnuva Sayfası</a>
            </div>
            <button id="logout-btn" class="btn-secondary btn-small">Çıkış</button>
        </div>

        <div class="admin-content">
            <div class="tabs">
                <button class="active" onclick="showTab('matches')">Maçlar</button>
                <button onclick="showTab('add')">Maç Ekle</button>
                <button onclick="showTab('teams')">Takımlar</button>
                <button onclick="showTab('attendance')">Yoklama</button>
            </div>

            <!-- Maçlar -->
            <div id="matches-tab" class="tab-content active">
                <h2 style="color:#8B0000;margin-bottom:20px;">Tüm Maçlar</h2>
                <div id="matches-list"></div>
            </div>

            <!-- Maç Ekle -->
            <div id="add-tab" class="tab-content">
                <h2 style="color:#8B0000;margin-bottom:20px;">Yeni Maç Ekle</h2>
                <div id="success-msg" style="display:none;" class="success"></div>
                
                <form id="add-match-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Tarih</label>
                            <input type="date" id="match-date" required>
                        </div>
                        <div class="form-group">
                            <label>Grup</label>
                            <select id="match-group" required>
                                <option value="">Seçiniz</option>
                                <option value="A">A Grubu</option>
                                <option value="B">B Grubu</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>Ev Sahibi</label>
                            <select id="team1" required></select>
                        </div>
                        <div class="form-group">
                            <label>Deplasman</label>
                            <select id="team2" required></select>
                        </div>
                    </div>
                    
                    <button type="submit">Maç Ekle</button>
                </form>
            </div>

            <!-- Takımlar -->
            <div id="teams-tab" class="tab-content">
                <h2 style="color:#8B0000;margin-bottom:20px;">Takımları Yönet</h2>
                
                <h3 style="margin:20px 0 10px;">A Grubu</h3>
                <div id="groupA-list"></div>
                <form id="add-teamA-form" style="margin-top:10px;">
                    <div style="display:flex;gap:10px;">
                        <input type="text" id="new-teamA" placeholder="Yeni takım adı">
                        <button type="submit" class="btn-small">Ekle</button>
                    </div>
                </form>

                <h3 style="margin:20px 0 10px;">B Grubu</h3>
                <div id="groupB-list"></div>
                <form id="add-teamB-form" style="margin-top:10px;">
                    <div style="display:flex;gap:10px;">
                        <input type="text" id="new-teamB" placeholder="Yeni takım adı">
                        <button type="submit" class="btn-small">Ekle</button>
                    </div>
                </form>
            </div>

            <!-- Yoklama -->
            <div id="attendance-tab" class="tab-content">
                <h2 style="color:#8B0000;margin-bottom:20px;">Yoklama Sistemi</h2>
                
                <!-- Grup ve Tarih Seçimi -->
                <div style="background:#f9f9f9;padding:20px;border-radius:10px;margin-bottom:20px;">
                    <div class="form-group">
                        <label>👥 Grup Seçin</label>
                        <select id="yoklama-group" onchange="loadYoklamaAthletes()" style="font-size:16px;">
                            <option value="">Grup seçiniz...</option>
                            <option value="kulup">Kulüp Voleybol</option>
                            <option value="buyuk-akademi">Büyük Akademi Voleybol</option>
                            <option value="kucuk-akademi">Küçük Akademi Voleybol</option>
                            <option value="buyuk-soog">Büyük Voleybol S.O.O.G.</option>
                            <option value="kucuk-soog">Küçük Voleybol S.O.O.G.</option>
                            <option value="soor">Voleybol S.O.O.R.</option>
                            <option value="kadin">Kadın Voleybol</option>
                            <option value="basketbol">Basketbol</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>📅 Tarih</label>
                        <input type="date" id="yoklama-date" onchange="loadYoklamaAthletes()" style="font-size:16px;">
                    </div>
                </div>

                <!-- Sporcular ve Yoklama -->
                <div id="yoklama-athletes-container"></div>

                <!-- Kaydet Butonu -->
                <div id="yoklama-save-section" style="display:none;margin-top:20px;">
                    <button class="btn" onclick="saveYoklamaAttendance()">💾 Yoklamayı Kaydet</button>
                </div>

                <!-- Genel Tablo - Tarih Bazlı Görünüm -->
                <div id="yoklama-date-view-section" style="margin-top:30px;"></div>

                <!-- İstatistikler -->
                <div id="yoklama-stats-section" style="margin-top:30px;"></div>

                <!-- Sporcu Yönetimi -->
                <div id="yoklama-manage-section" style="margin-top:30px;"></div>
            </div>

            <!-- Yoklama -->
            <div id="attendance-tab" class="tab-content">
                <h2 style="color:#8B0000;margin-bottom:20px;">Yoklama Sistemi</h2>
                
                <!-- Sporcu Yönetimi -->
                <div style="background:#f9f9f9;padding:20px;border-radius:10px;margin-bottom:30px;">
                    <h3 style="color:#8B0000;margin-bottom:15px;">Sporcular</h3>
                    <div id="athletes-list"></div>
                    
                    <form id="add-athlete-form" style="margin-top:15px;">
                        <div style="display:flex;gap:10px;">
                            <input type="text" id="new-athlete-name" placeholder="İsim" required style="flex:1;">
                            <input type="text" id="new-athlete-surname" placeholder="Soyisim" required style="flex:1;">
                            <button type="submit" class="btn-small">➕ Sporcu Ekle</button>
                        </div>
                    </form>
                </div>

                <!-- Yoklama Al -->
                <div style="background:#f9f9f9;padding:20px;border-radius:10px;margin-bottom:30px;">
                    <h3 style="color:#8B0000;margin-bottom:15px;">Bugünün Yoklaması</h3>
                    
                    <div class="form-group">
                        <label>Tarih Seç</label>
                        <input type="date" id="attendance-date" style="max-width:300px;">
                    </div>
                    
                    <div id="attendance-list"></div>
                    
                    <button id="save-attendance-btn" class="btn-secondary" style="margin-top:15px;">💾 Yoklamayı Kaydet</button>
                </div>

                <!-- İstatistikler -->
                <div style="background:#f9f9f9;padding:20px;border-radius:10px;margin-bottom:30px;">
                    <h3 style="color:#8B0000;margin-bottom:15px;">📊 İstatistikler</h3>
                    <div id="attendance-stats"></div>
                </div>

                <!-- Geçmiş Yoklamalar -->
                <div style="background:#f9f9f9;padding:20px;border-radius:10px;">
                    <h3 style="color:#8B0000;margin-bottom:15px;">📅 Geçmiş Yoklamalar</h3>
                    <div id="attendance-history"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div id="edit-modal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);padding:20px;overflow-y:auto;">
        <div style="max-width:600px;margin:50px auto;background:white;padding:30px;border-radius:15px;">
            <h2 style="color:#8B0000;margin-bottom:20px;">Maç Sonucu Gir</h2>
            <form id="edit-form">
                <input type="hidden" id="edit-index">
                <div id="edit-title" style="font-size:1.1em;margin-bottom:20px;"></div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label id="edit-team1-label"></label>
                        <input type="number" id="edit-score1" min="0" max="3" placeholder="Set sayısı">
                    </div>
                    <div class="form-group">
                        <label id="edit-team2-label"></label>
                        <input type="number" id="edit-score2" min="0" max="3" placeholder="Set sayısı">
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Set Skorları (opsiyonel)</label>
                    <input type="text" id="edit-sets" placeholder="Örn: 25-20, 23-25, 25-18">
                </div>
                
                <button type="submit">Kaydet</button>
                <button type="button" class="btn-secondary" onclick="closeModal()">İptal</button>
            </form>
        </div>
    </div>

    <script src="tournament.js"></script>
    <script>
        const ADMIN_PASS = 'vaveyla2026'; // Admin şifresi
        const COACH_PASS = 'hoca2026'; // Hoca şifresi
        let userRole = ''; // 'admin' veya 'coach'
        
        // Login
        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;
            
            if (password === ADMIN_PASS) {
                userRole = 'admin';
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('admin-panel').style.display = 'block';
                loadAdmin();
                showAdminView();
            } else if (password === COACH_PASS) {
                userRole = 'coach';
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('admin-panel').style.display = 'block';
                loadAdmin();
                showCoachView();
            } else {
                document.getElementById('login-error').textContent = 'Yanlış şifre!';
            }
        });

        // Admin görünümü
        function showAdminView() {
            // Tüm sekmeleri göster
            document.querySelectorAll('.tabs button').forEach(btn => btn.style.display = 'block');
            document.querySelector('.admin-header h1').textContent = '🏐 Admin Paneli';
        }

        // Hoca görünümü
        function showCoachView() {
            // Sadece yoklama sekmesini göster
            document.querySelectorAll('.tabs button').forEach(btn => {
                if (btn.textContent.includes('Yoklama')) {
                    btn.style.display = 'block';
                    btn.click(); // Yoklama sekmesini otomatik aç
                } else {
                    btn.style.display = 'none';
                }
            });
            document.querySelector('.admin-header h1').textContent = '📋 Yoklama Paneli';
        }

        // Logout
        document.getElementById('logout-btn').addEventListener('click', () => {
            document.getElementById('login-screen').style.display = 'block';
            document.getElementById('admin-panel').style.display = 'none';
            document.getElementById('password').value = '';
        });

        // Tab değiştir
        function showTab(tab) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
            document.getElementById(tab + '-tab').classList.add('active');
            event.target.classList.add('active');
        }

        // Admin yükle
        function loadAdmin() {
            displayMatches();
            displayTeamsAdmin();
            updateTeamSelects();
        }

        // Maçları göster
        function displayMatches() {
            const data = loadData();
            const container = document.getElementById('matches-list');
            
            if (data.matches.length === 0) {
                container.innerHTML = '<p style="text-align:center;color:#666;">Henüz maç yok.</p>';
                return;
            }
            
            let html = '';
            data.matches.forEach((match, i) => {
                const status = match.played ? '✅ Oynandı' : '⏳ Bekliyor';
                const score = match.played ? `${match.score1}-${match.score2}` : 'vs';
                html += `
                    <div class="match-item">
                        <div>
                            <strong>${match.team1}</strong> ${score} <strong>${match.team2}</strong><br>
                            <small>${match.date} • ${match.group} Grubu • ${status}</small>
                        </div>
                        <div>
                            <button class="btn-secondary btn-small" onclick="editMatch(${i})">${match.played ? 'Düzenle' : 'Sonuç Gir'}</button>
                            <button class="btn-danger btn-small" onclick="deleteMatch(${i})">Sil</button>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        // Takımları göster
        function displayTeamsAdmin() {
            const data = loadData();
            
            ['A', 'B'].forEach(group => {
                const teams = data.teams['group' + group];
                const container = document.getElementById('group' + group + '-list');
                let html = '';
                teams.forEach((team, i) => {
                    html += `
                        <div class="match-item">
                            ${team}
                            <button class="btn-danger btn-small" onclick="deleteTeam('${group}',${i})">Sil</button>
                        </div>
                    `;
                });
                container.innerHTML = html;
            });
        }

        // Takım select'leri güncelle
        function updateTeamSelects() {
            document.getElementById('match-group').addEventListener('change', function() {
                const data = loadData();
                const group = this.value;
                if (!group) return;
                
                const teams = data.teams['group' + group];
                let opts = '<option value="">Seçiniz</option>';
                teams.forEach(t => opts += `<option value="${t}">${t}</option>`);
                
                document.getElementById('team1').innerHTML = opts;
                document.getElementById('team2').innerHTML = opts;
            });
        }

        // Maç ekle
        document.getElementById('add-match-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const data = loadData();
            
            const date = new Date(document.getElementById('match-date').value);
            const months = ['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];
            const dateStr = date.getDate() + ' ' + months[date.getMonth()] + ' ' + date.getFullYear();
            
            const match = {
                date: dateStr,
                group: document.getElementById('match-group').value,
                team1: document.getElementById('team1').value,
                team2: document.getElementById('team2').value,
                score1: null,
                score2: null,
                sets: '',
                played: false
            };
            
            if (match.team1 === match.team2) {
                alert('Aynı takım kendisiyle oynamaz!');
                return;
            }
            
            data.matches.push(match);
            saveData(data);
            
            document.getElementById('add-match-form').reset();
            document.getElementById('success-msg').textContent = '✅ Maç eklendi!';
            document.getElementById('success-msg').style.display = 'block';
            setTimeout(() => document.getElementById('success-msg').style.display = 'none', 3000);
            
            displayMatches();
        });

        // Maç düzenle
        function editMatch(index) {
            const data = loadData();
            const match = data.matches[index];
            
            document.getElementById('edit-index').value = index;
            document.getElementById('edit-title').textContent = match.team1 + ' vs ' + match.team2;
            document.getElementById('edit-team1-label').textContent = match.team1;
            document.getElementById('edit-team2-label').textContent = match.team2;
            document.getElementById('edit-score1').value = match.score1 || '';
            document.getElementById('edit-score2').value = match.score2 || '';
            document.getElementById('edit-sets').value = match.sets || '';
            document.getElementById('edit-modal').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('edit-modal').style.display = 'none';
        }

        // Maç kaydet
        document.getElementById('edit-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const data = loadData();
            const index = document.getElementById('edit-index').value;
            const s1 = parseInt(document.getElementById('edit-score1').value);
            const s2 = parseInt(document.getElementById('edit-score2').value);
            
            if (Math.abs(s1-s2) > 2 || (s1<3 && s2<3)) {
                alert('Geçersiz skor! (3-0, 3-1, 3-2 veya 2-3, 1-3, 0-3)');
                return;
            }
            
            data.matches[index].score1 = s1;
            data.matches[index].score2 = s2;
            data.matches[index].sets = document.getElementById('edit-sets').value;
            data.matches[index].played = true;
            
            saveData(data);
            closeModal();
            displayMatches();
            alert('✅ Sonuç kaydedildi!');
        });

        // Maç sil
        function deleteMatch(index) {
            if (!confirm('Bu maçı silmek istediğinize emin misiniz?')) return;
            const data = loadData();
            data.matches.splice(index, 1);
            saveData(data);
            displayMatches();
        }

        // Takım ekle
        ['A','B'].forEach(group => {
            document.getElementById('add-team'+group+'-form').addEventListener('submit', (e) => {
                e.preventDefault();
                const data = loadData();
                const name = document.getElementById('new-team'+group).value.trim();
                if (!name) return;
                
                if (data.teams['group'+group].includes(name)) {
                    alert('Bu takım zaten var!');
                    return;
                }
                
                data.teams['group'+group].push(name);
                saveData(data);
                document.getElementById('new-team'+group).value = '';
                displayTeamsAdmin();
            });
        });

        // Takım sil
        function deleteTeam(group, index) {
            if (!confirm('Bu takımı silmek istediğinize emin misiniz?')) return;
            const data = loadData();
            data.teams['group'+group].splice(index, 1);
            saveData(data);
            displayTeamsAdmin();
        }

        // ========== YOKLAMA SİSTEMİ ==========
        
        const YOKLAMA_KEY = 'vaveyla_yoklama_data';
        let currentYoklamaAttendance = {};
        let currentYoklamaGroup = '';

        // Yoklama verilerini yükle
        // Yoklama verilerini yükle (Firebase + localStorage)
        function loadYoklamaData() {
            const saved = localStorage.getItem(YOKLAMA_KEY);
            return saved ? JSON.parse(saved) : { athletes: {}, attendances: {} };
        }

        // Yoklama verilerini kaydet (Firebase + localStorage)
        function saveYoklamaData(data) {
            // LocalStorage'a kaydet (hemen)
            localStorage.setItem(YOKLAMA_KEY, JSON.stringify(data));
            
            // Firebase'e kaydet (varsa)
            if (typeof database !== 'undefined') {
                database.ref('yoklama').set(data).then(() => {
                    console.log('💾 Yoklama Firebase\'e kaydedildi');
                }).catch((error) => {
                    console.log('⚠️ Firebase kaydetme hatası:', error);
                });
            }
        }

        // Bugünün tarihini yoklama için set et
        function setYoklamaTodayDate() {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('yoklama-date').value = today;
        }

        // Yoklama sporcularını yükle
        function loadYoklamaAthletes() {
            try {
                const group = document.getElementById('yoklama-group').value;
                const date = document.getElementById('yoklama-date').value;
                
                if (!group || !date) {
                    document.getElementById('yoklama-athletes-container').innerHTML = '';
                    document.getElementById('yoklama-save-section').style.display = 'none';
                    document.getElementById('yoklama-date-view-section').innerHTML = '';
                    return;
                }

                currentYoklamaGroup = group;
                
                const data = loadYoklamaData();
                
                // Güvenli veri kontrolü
                if (!data.athletes) data.athletes = {};
                if (!data.athletes[group]) data.athletes[group] = [];
                if (!data.attendances) data.attendances = {};
                
                const athletes = data.athletes[group];
                const container = document.getElementById('yoklama-athletes-container');
                
                if (athletes.length === 0) {
                    container.innerHTML = `
                        <div style="text-align:center;padding:40px 20px;background:#f9f9f9;border-radius:10px;">
                            <div style="font-size:3em;margin-bottom:15px;">🏐</div>
                            <p style="color:#666;">Bu grupta henüz sporcu yok.</p>
                            <p style="color:#999;font-size:0.9em;margin-top:10px;">Aşağıdan sporcu ekleyebilirsiniz.</p>
                        </div>
                    `;
                    loadYoklamaManageSection(group);
                    document.getElementById('yoklama-save-section').style.display = 'none';
                    document.getElementById('yoklama-date-view-section').innerHTML = '';
                    return;
                }

                // Mevcut yoklamayı yükle ve currentAttendance'a aktar
                const attendanceKey = `${group}_${date}`;
                const existing = data.attendances[attendanceKey] || {};
                currentYoklamaAttendance = {...existing}; // Mevcut yoklamayı kopyala

                let html = `
                    <div class="yoklama-summary">
                        <div class="yoklama-summary-number">${athletes.length}</div>
                        <div style="font-size:1.1em;margin-top:5px;">Toplam Sporcu</div>
                    </div>
                `;

                athletes.forEach((athlete, i) => {
                    const athleteId = athlete.id;
                    const status = currentYoklamaAttendance[athleteId];
                    const statusText = status === true ? '✓ Geldi' : status === false ? '✗ Gelmedi' : 'İşaretlenmedi';
                    const statusColor = status === true ? '#28a745' : status === false ? '#dc3545' : '#999';
                    const presentClass = status === true ? 'present' : '';
                    const absentClass = status === false ? 'absent' : '';

                    html += `
                        <div class="yoklama-athlete-card">
                            <div class="yoklama-athlete-header">
                                <div>
                                    <div class="yoklama-athlete-name">${athlete.fullname || (athlete.name + ' ' + athlete.surname)}</div>
                                    <div class="yoklama-athlete-status" id="status-${athleteId}" style="color:${statusColor};">${statusText}</div>
                                </div>
                                <div class="yoklama-buttons">
                                    <button class="yoklama-btn ${presentClass}" id="present-${athleteId}" onclick="markYoklamaPresent('${athleteId}')">✓</button>
                                    <button class="yoklama-btn ${absentClass}" id="absent-${athleteId}" onclick="markYoklamaAbsent('${athleteId}')">✗</button>
                                </div>
                            </div>
                        </div>
                    `;
                });

                container.innerHTML = html;
                document.getElementById('yoklama-save-section').style.display = 'block';
                loadYoklamaDateView(group, date);
                loadYoklamaStats(group);
                loadYoklamaManageSection(group);
            } catch (error) {
                console.error('❌ loadYoklamaAthletes hatası:', error);
                const container = document.getElementById('yoklama-athletes-container');
                container.innerHTML = `
                    <div style="text-align:center;padding:40px 20px;background:#fff3cd;border-radius:10px;border:2px solid #ffc107;">
                        <div style="font-size:2.5em;margin-bottom:15px;">⚠️</div>
                        <p style="color:#856404;font-weight:bold;">Veri yükleme hatası!</p>
                        <p style="color:#856404;font-size:0.9em;margin-top:10px;">Lütfen sayfayı yenileyin veya başka bir grup seçin.</p>
                    </div>
                `;
                // Yine de sporcu ekleme bölümünü göster
                loadYoklamaManageSection(document.getElementById('yoklama-group').value);
            }
        }

        // Tarih bazlı genel tablo
        function loadYoklamaDateView(group, date) {
            const container = document.getElementById('yoklama-date-view-section');
            const data = loadYoklamaData();
            
            if (!data.attendances) data.attendances = {};
            
            if (!data.athletes[group] || data.athletes[group].length === 0) {
                container.innerHTML = '';
                return;
            }

            const athletes = data.athletes[group];
            const attendanceKey = `${group}_${date}`;
            const dayAttendance = data.attendances[attendanceKey];

            if (!dayAttendance || Object.keys(dayAttendance).length === 0) {
                container.innerHTML = '';
                return;
            }

            // Tarihi formatla
            const dateObj = new Date(date);
            const formattedDate = dateObj.toLocaleDateString('tr-TR', { 
                day: 'numeric', 
                month: 'long', 
                year: 'numeric'
            });

            // Gelenler ve gelmeyenleri ayır
            const present = [];
            const absent = [];

            athletes.forEach((athlete, i) => {
                const athleteId = athlete.id;
                const status = dayAttendance[athleteId];
                const name = athlete.fullname || (athlete.name + ' ' + athlete.surname);
                
                if (status === true) {
                    present.push(name);
                } else if (status === false) {
                    absent.push(name);
                }
            });

            if (present.length === 0 && absent.length === 0) {
                container.innerHTML = '';
                return;
            }

            let html = `
                <div style="background:#f9f9f9;padding:20px;border-radius:10px;">
                    <h3 style="color:#8B0000;margin-bottom:15px;">📅 ${formattedDate} Antrenmanı</h3>
                    
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:20px;">
            `;

            // Gelenler
            html += `
                <div style="background:white;padding:20px;border-radius:10px;border-left:4px solid #28a745;">
                    <h4 style="color:#28a745;margin-bottom:15px;font-size:1.1em;">
                        ✓ GELENLER (${present.length} kişi)
                    </h4>
            `;

            if (present.length > 0) {
                present.forEach(name => {
                    html += `
                        <div style="padding:8px 0;border-bottom:1px solid #f0f0f0;">
                            • ${name}
                        </div>
                    `;
                });
            } else {
                html += '<p style="color:#999;font-style:italic;">Kimse gelmedi</p>';
            }

            html += '</div>';

            // Gelmeyenler
            html += `
                <div style="background:white;padding:20px;border-radius:10px;border-left:4px solid #dc3545;">
                    <h4 style="color:#dc3545;margin-bottom:15px;font-size:1.1em;">
                        ✗ GELMEYENLER (${absent.length} kişi)
                    </h4>
            `;

            if (absent.length > 0) {
                absent.forEach(name => {
                    html += `
                        <div style="padding:8px 0;border-bottom:1px solid #f0f0f0;">
                            • ${name}
                        </div>
                    `;
                });
            } else {
                html += '<p style="color:#999;font-style:italic;">Herkes geldi! 🎉</p>';
            }

            html += '</div>';
            html += '</div></div>';

            container.innerHTML = html;
        }

        // Geldi işaretle
        function markYoklamaPresent(athleteId) {
            // Eğer zaten geldi işaretliyse, işareti kaldır
            if (currentYoklamaAttendance[athleteId] === true) {
                delete currentYoklamaAttendance[athleteId];
                
                // UI'yi güncelle - işaretsiz hale getir
                document.getElementById('present-' + athleteId).classList.remove('present');
                document.getElementById('status-' + athleteId).textContent = 'İşaretlenmedi';
                document.getElementById('status-' + athleteId).style.color = '#999';
            } else {
                // Geldi olarak işaretle
                currentYoklamaAttendance[athleteId] = true;
                
                // UI'yi anında güncelle
                document.getElementById('present-' + athleteId).classList.add('present');
                document.getElementById('absent-' + athleteId).classList.remove('absent');
                document.getElementById('status-' + athleteId).textContent = '✓ Geldi';
                document.getElementById('status-' + athleteId).style.color = '#28a745';
            }
        }

        // Gelmedi işaretle
        function markYoklamaAbsent(athleteId) {
            // Eğer zaten gelmedi işaretliyse, işareti kaldır
            if (currentYoklamaAttendance[athleteId] === false) {
                delete currentYoklamaAttendance[athleteId];
                
                // UI'yi güncelle - işaretsiz hale getir
                document.getElementById('absent-' + athleteId).classList.remove('absent');
                document.getElementById('status-' + athleteId).textContent = 'İşaretlenmedi';
                document.getElementById('status-' + athleteId).style.color = '#999';
            } else {
                // Gelmedi olarak işaretle
                currentYoklamaAttendance[athleteId] = false;
                
                // UI'yi anında güncelle
                document.getElementById('absent-' + athleteId).classList.add('absent');
                document.getElementById('present-' + athleteId).classList.remove('present');
                document.getElementById('status-' + athleteId).textContent = '✗ Gelmedi';
                document.getElementById('status-' + athleteId).style.color = '#dc3545';
            }
        }

        // Yoklamayı kaydet
        function saveYoklamaAttendance() {
            const group = document.getElementById('yoklama-group').value;
            const date = document.getElementById('yoklama-date').value;

            if (!group || !date) {
                alert('⚠️ Lütfen grup ve tarih seçin!');
                return;
            }

            const changedCount = Object.keys(currentYoklamaAttendance).length;
            
            if (changedCount === 0) {
                alert('⚠️ Henüz hiç yoklama işaretlemediniz!');
                return;
            }

            const data = loadYoklamaData();
            const attendanceKey = `${group}_${date}`;
            
            if (!data.attendances[attendanceKey]) {
                data.attendances[attendanceKey] = {};
            }

            // Tüm işaretlemeleri kaydet
            Object.assign(data.attendances[attendanceKey], currentYoklamaAttendance);
            saveYoklamaData(data);

            // Kaç kişi geldi/gelmedi
            let present = 0, absent = 0;
            Object.values(currentYoklamaAttendance).forEach(status => {
                if (status === true) present++;
                else if (status === false) absent++;
            });

            alert(`✅ Yoklama kaydedildi!\n\n✓ Geldi: ${present} kişi\n✗ Gelmedi: ${absent} kişi`);
            
            loadYoklamaDateView(group, date);
            loadYoklamaStats(group);
        }

        // İstatistikler
        function loadYoklamaStats(group) {
            const data = loadYoklamaData();
            const container = document.getElementById('yoklama-stats-section');
            
            if (!data.athletes[group] || data.athletes[group].length === 0) {
                container.innerHTML = '';
                return;
            }

            const athletes = data.athletes[group];
            
            // Bu grup için tüm yoklamaları bul
            const groupAttendances = {};
            Object.keys(data.attendances).forEach(key => {
                if (key.startsWith(group + '_')) {
                    groupAttendances[key] = data.attendances[key];
                }
            });

            const totalDays = Object.keys(groupAttendances).length;

            if (totalDays === 0) {
                container.innerHTML = '';
                return;
            }

            let html = '<div style="background:#f9f9f9;padding:20px;border-radius:10px;">';
            html += '<h3 style="color:#8B0000;margin-bottom:15px;">📊 İstatistikler</h3>';
            html += `<p style="margin-bottom:15px;color:#666;">Toplam ${totalDays} yoklama günü</p>`;

            athletes.forEach((athlete, i) => {
                const athleteId = athlete.id;
                let present = 0;
                let total = 0;
                const attendanceHistory = [];

                // Tarihe göre sıralı geçmiş
                Object.keys(groupAttendances).sort().reverse().forEach(key => {
                    const day = groupAttendances[key];
                    if (day[athleteId] !== undefined) {
                        total++;
                        const date = key.split('_')[1]; // grup_tarih formatından tarihi al
                        const status = day[athleteId];
                        if (status === true) present++;
                        
                        const dateObj = new Date(date);
                        const formatted = dateObj.toLocaleDateString('tr-TR', { 
                            day: 'numeric', 
                            month: 'short',
                            year: 'numeric'
                        });
                        
                        attendanceHistory.push({
                            date: formatted,
                            status: status,
                            statusText: status ? '✓ Geldi' : '✗ Gelmedi',
                            statusColor: status ? '#28a745' : '#dc3545'
                        });
                    }
                });

                const percentage = total > 0 ? Math.round((present / total) * 100) : 0;
                const athleteName = athlete.fullname || (athlete.name + ' ' + athlete.surname);

                html += `
                    <div class="stat-card" style="cursor:pointer;transition:all 0.3s;" onclick="toggleAthleteStats('${athleteId}')">
                        <div class="stat-header">
                            <div class="stat-name">${athleteName}</div>
                            <div style="display:flex;align-items:center;gap:15px;">
                                <div style="font-size:0.9em;color:#666;">
                                    <span style="color:#28a745;">✓${present}</span> / 
                                    <span style="color:#dc3545;">✗${total - present}</span>
                                </div>
                                <div class="stat-percentage">${percentage}%</div>
                                <div id="arrow-${athleteId}" style="transition:transform 0.3s;">▼</div>
                            </div>
                        </div>
                        <div class="progress-bar" style="margin-top:10px;">
                            <div class="progress-fill" style="width:${percentage}%"></div>
                        </div>
                        
                        <div id="athlete-history-${athleteId}" style="display:none;margin-top:15px;padding-top:15px;border-top:2px solid #eee;">
                            <h4 style="color:#8B0000;font-size:1em;margin-bottom:10px;">Yoklama Geçmişi:</h4>
                `;

                if (attendanceHistory.length > 0) {
                    attendanceHistory.forEach(record => {
                        html += `
                            <div style="padding:8px 12px;background:white;border-radius:6px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;">
                                <span style="font-weight:500;">${record.date}</span>
                                <span style="color:${record.statusColor};font-weight:600;">${record.statusText}</span>
                            </div>
                        `;
                    });
                } else {
                    html += '<p style="color:#999;font-style:italic;">Henüz yoklama kaydı yok.</p>';
                }

                html += `
                        </div>
                    </div>
                `;
            });

            html += '</div>';
            container.innerHTML = html;
        }

        // Sporcu istatistik detayını aç/kapa
        function toggleAthleteStats(athleteId) {
            const history = document.getElementById('athlete-history-' + athleteId);
            const arrow = document.getElementById('arrow-' + athleteId);
            
            if (history.style.display === 'none') {
                history.style.display = 'block';
                arrow.style.transform = 'rotate(180deg)';
            } else {
                history.style.display = 'none';
                arrow.style.transform = 'rotate(0deg)';
            }
        }

        // Sporcu yönetimi
        function loadYoklamaManageSection(group) {
            try {
                const container = document.getElementById('yoklama-manage-section');
                if (!container) {
                    console.error('yoklama-manage-section element bulunamadı!');
                    return;
                }
                
                const data = loadYoklamaData();
                
                // Güvenli veri kontrolü
                if (!data.athletes) data.athletes = {};
                if (!data.athletes[group]) data.athletes[group] = [];
                
                const athletes = data.athletes[group];

                let html = `
                    <div style="background:#f9f9f9;padding:20px;border-radius:10px;">
                        <h3 style="color:#8B0000;margin-bottom:15px;">👥 Sporcu Yönetimi (${athletes.length})</h3>
                `;

                if (athletes.length > 0) {
                    athletes.forEach((athlete, i) => {
                        html += `
                            <div class="match-item" style="margin-bottom:10px;">
                                <div id="athlete-display-${i}">
                                    <strong>${athlete.fullname}</strong>
                                </div>
                                <div id="athlete-edit-${i}" style="display:none;flex:1;">
                                    <input type="text" id="athlete-input-${i}" value="${athlete.fullname}" style="width:100%;margin:0;">
                                </div>
                                <div style="display:flex;gap:8px;">
                                    <button class="btn-secondary btn-small" id="edit-btn-${i}" onclick="editYoklamaAthlete('${group}', ${i})">Düzenle</button>
                                    <button class="btn-secondary btn-small" id="save-btn-${i}" onclick="saveYoklamaAthlete('${group}', ${i})" style="display:none;">Kaydet</button>
                                    <button class="btn-danger btn-small" onclick="deleteYoklamaAthlete('${group}', ${i})">Sil</button>
                                </div>
                            </div>
                        `;
                    });
                } else {
                    html += '<p style="text-align:center;color:#666;padding:20px 0;">Henüz sporcu eklenmemiş.</p>';
                }

                html += `
                    <form onsubmit="event.preventDefault(); addYoklamaAthlete('${group}');" style="margin-top:15px;">
                        <div style="display:flex;gap:10px;">
                            <input type="text" id="yoklama-new-fullname-${group}" placeholder="İsim Soyisim (örn: Ahmet Yılmaz)" required style="flex:1;">
                            <button type="submit" class="btn" style="width:auto;padding:18px 25px;">➕ Ekle</button>
                        </div>
                    </form>
                    </div>
                `;

                container.innerHTML = html;
            } catch (error) {
                console.error('❌ loadYoklamaManageSection hatası:', error);
            }
        }

        // Düzenleme modu aç
        function editYoklamaAthlete(group, index) {
            document.getElementById('athlete-display-' + index).style.display = 'none';
            document.getElementById('athlete-edit-' + index).style.display = 'block';
            document.getElementById('edit-btn-' + index).style.display = 'none';
            document.getElementById('save-btn-' + index).style.display = 'inline-block';
            document.getElementById('athlete-input-' + index).focus();
        }

        // Düzenlemeyi kaydet
        function saveYoklamaAthlete(group, index) {
            const newName = document.getElementById('athlete-input-' + index).value.trim();
            
            if (!newName) {
                alert('⚠️ İsim boş olamaz!');
                return;
            }

            const data = loadYoklamaData();
            data.athletes[group][index].fullname = newName;
            saveYoklamaData(data);

            alert('✅ Sporcu güncellendi!');
            
            // Tüm bölümleri yenile
            const date = document.getElementById('yoklama-date').value;
            loadYoklamaManageSection(group);
            loadYoklamaAthletes();
            
            // Eğer tarih seçiliyse genel tabloyu da güncelle
            if (date) {
                loadYoklamaDateView(group, date);
            }
        }

        // Sporcu ekle
        function addYoklamaAthlete(group) {
            try {
                const fullname = document.getElementById('yoklama-new-fullname-' + group).value.trim();

                if (!fullname) return;

                const data = loadYoklamaData();
                
                // Güvenli veri kontrolü
                if (!data.athletes) data.athletes = {};
                if (!data.athletes[group]) data.athletes[group] = [];

                // Unique ID oluştur (timestamp + random)
                const athleteId = Date.now() + '_' + Math.random().toString(36).substr(2, 9);

                data.athletes[group].push({ 
                    id: athleteId,
                    fullname: fullname 
                });
                saveYoklamaData(data);

                alert('✅ Sporcu eklendi!');
                document.getElementById('yoklama-new-fullname-' + group).value = '';
                loadYoklamaAthletes(); // Tüm bölümleri yenile
            } catch (error) {
                console.error('❌ Sporcu ekleme hatası:', error);
                alert('⚠️ Sporcu eklenirken hata oluştu!');
            }
        }

        // Sporcu sil
        function deleteYoklamaAthlete(group, index) {
            if (!confirm('Bu sporcuyu silmek istediğinize emin misiniz?')) return;

            const data = loadYoklamaData();
            
            // Silinecek sporcunun ID'sini al
            const deletedAthleteId = data.athletes[group][index].id;
            
            // Sporcu listesinden sil
            data.athletes[group].splice(index, 1);
            
            // Tüm yoklamalardan bu sporcunun kayıtlarını sil
            if (data.attendances) {
                Object.keys(data.attendances).forEach(attendanceKey => {
                    if (attendanceKey.startsWith(group + '_')) {
                        delete data.attendances[attendanceKey][deletedAthleteId];
                    }
                });
            }
            
            saveYoklamaData(data);

            alert('✅ Sporcu silindi!');
            
            // Tüm bölümleri yenile
            const date = document.getElementById('yoklama-date').value;
            loadYoklamaAthletes();
            
            // Eğer tarih seçiliyse genel tabloyu da güncelle
            if (date) {
                loadYoklamaDateView(group, date);

        };
