<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Paneli - Vaveyla Turnuva</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #8B0000 0%, #4a0000 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .login-container {
            max-width: 400px;
            margin: 100px auto;
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 50px rgba(0,0,0,0.3);
        }
        .login-container h2 { color: #8B0000; text-align: center; margin-bottom: 30px; }

        .admin-container { display: none; max-width: 1200px; margin: 0 auto; }

        .admin-header {
            background: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .admin-header h1 { color: #8B0000; }

        .admin-content { background: white; padding: 30px; border-radius: 15px; }

        .form-group { margin-bottom: 20px; }
        label { display: block; color: #333; font-weight: 600; margin-bottom: 8px; }
        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
        }
        input:focus, select:focus, textarea:focus { outline: none; border-color: #8B0000; }

        button {
            width: 100%;
            padding: 15px;
            background: #8B0000;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background: #6B0000; }

        .btn-small { width: auto; padding: 8px 15px; font-size: 0.9em; display: inline-block; margin: 5px; }
        .btn-secondary { background: #FFD700; color: #8B0000; }
        .btn-secondary:hover { background: #e6c200; }
        .btn-danger { background: #dc3545; }
        .btn-danger:hover { background: #b02a37; }

        .match-item {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .success { background: #28a745; color: white; padding: 15px; border-radius: 8px; margin-bottom: 20px; text-align: center; }
        .error { color: #dc3545; text-align: center; margin-top: 10px; }
        .back-link { color: #FFD700; text-decoration: none; }

        .tabs { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .tabs button { flex: 1; background: #ddd; color: #333; min-width: 80px; }
        .tabs button.active { background: #8B0000; color: white; }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        /* Yoklama stilleri */
        .yoklama-athlete-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .yoklama-athlete-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .yoklama-athlete-name { font-size: 1.2em; font-weight: 600; color: #333; }
        .yoklama-buttons { display: flex; gap: 12px; }
        .yoklama-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 3px solid #ddd;
            background: white;
            font-size: 1.8em;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .yoklama-btn:active { transform: scale(0.9); }
        .yoklama-btn.present { border-color: #28a745; background: #28a745; color: white; }
        .yoklama-btn.absent { border-color: #dc3545; background: #dc3545; color: white; }

        .yoklama-summary {
            background: linear-gradient(135deg, #FFD700, #FFC700);
            color: #8B0000;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 20px;
        }
        .yoklama-summary-number { font-size: 2.5em; font-weight: bold; }
        .yoklama-athlete-status { margin-top: 8px; font-size: 0.95em; color: #666; }

        .stat-card { background: white; padding: 15px; border-radius: 8px; margin-bottom: 10px; }
        .progress-bar { background: #eee; height: 20px; border-radius: 10px; overflow: hidden; margin-top: 5px; }
        .progress-fill { background: #28a745; height: 100%; transition: width 0.3s; }

        /* Yükleniyor göstergesi */
        .loading { text-align: center; padding: 30px; color: #888; }

        @media (max-width: 768px) {
            .form-row { grid-template-columns: 1fr; }
            .match-item { flex-direction: column; align-items: flex-start; }
            .yoklama-athlete-header { flex-direction: column; align-items: flex-start; }
            .yoklama-buttons { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>

<!-- Login -->
<div id="login-screen" class="login-container">
    <h2>🔐 Admin Girişi</h2>
    <form id="login-form">
        <div class="form-group">
            <label>Şifre</label>
            <input type="password" id="password" required>
        </div>
        <button type="submit">Giriş Yap</button>
        <div id="login-error" class="error"></div>
    </form>
    <a href="index.html" style="display:block;text-align:center;margin-top:20px;color:#666;">← Ana Sayfaya Dön</a>

<!-- Admin Panel -->
<div id="admin-panel" class="admin-container">
    <div class="admin-header">
        <div>
            <h1 id="panel-title">🏐 Admin Paneli</h1>
            <a href="index.html" class="back-link">← Turnuva Sayfası</a>
        </div>

    <div class="admin-content">

        <!-- MAÇ EKLE -->
        <div id="add-tab" class="tab-content">
            <h2 style="color:#8B0000;margin-bottom:20px;">Yeni Maç Ekle</h2>

            <div class="form-row">
                <div class="form-group">
                    <label>Tarih</label>
                    <input type="date" id="match-date" required>
                </div>
                <div class="form-group">
                    <label>Grup</label>
                    <select id="match-group" required>
                        <option value="">Seçiniz</option>
                        <option value="A">A Grubu</option>

                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Ev Sahibi</label>
                    <select id="team1" required><option value="">Önce grup seçin</option></select>
                </div>
                <div class="form-group">
                    <label>Deplasman</label>
                    <select id="team2" required><option value="">Önce grup seçin</option></select>
                </div>
            </div>
            <button id="add-match-btn">Maç Ekle</button>
        </div>

        <!-- TAKIMLAR -->
        <div id="teams-tab" class="tab-content">
            <h2 style="color:#8B0000;margin-bottom:20px;">Takımları Yönet</h2>
            <h3 style="margin:20px 0 10px;">A Grubu</h3>
            <div id="groupA-list"></div>
            <div style="display:flex;gap:10px;margin-top:10px;">
                <input type="text" id="new-teamA" placeholder="Yeni A grubu takım adı">
                <button class="btn-small" id="addA-btn">Ekle</button>
            </div>

            <h3 style="margin:20px 0 10px;">B Grubu</h3>
            <div id="groupB-list"></div>
            <div style="display:flex;gap:10px;margin-top:10px;">
                <input type="text" id="new-teamB" placeholder="Yeni B grubu takım adı">
                <button class="btn-small" id="addB-btn">Ekle</button>
            </div>
        </div>

        <!-- YOKLAMA -->
        <div id="attendance-tab" class="tab-content">
            <h2 style="color:#8B0000;margin-bottom:20px;">Yoklama Sistemi</h2>

            <div style="background:#f9f9f9;padding:20px;border-radius:10px;margin-bottom:20px;">
                <div class="form-group">
                    <label>👥 Grup Seçin</label>
                    <select id="yoklama-group" onchange="loadYoklamaAthletes()" style="font-size:16px;">
                        <option value="">Grup seçiniz...</option>
                        <option value="kulup">Kulüp Voleybol</option>
                        <option value="buyuk-akademi">Büyük Akademi Voleybol</option>
                        <option value="kucuk-akademi">Küçük Akademi Voleybol</option>
                        <option value="buyuk-soog">Büyük Voleybol S.O.O.G.</option>
                        <option value="kucuk-soog">Küçük Voleybol S.O.O.G.</option>
                        <option value="soor">Voleybol S.O.O.R.</option>
                        <option value="kadin">Kadın Voleybol</option>
                        <option value="basketbol">Basketbol</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>📅 Tarih</label>
                    <input type="date" id="yoklama-date" onchange="loadYoklamaAthletes()" style="font-size:16px;">
                </div>
            </div>

            <div id="yoklama-athletes-container"></div>

            <div id="yoklama-save-section" style="display:none;margin-top:20px;">
                <button onclick="saveYoklamaAttendance()">💾 Yoklamayı Kaydet</button>
            </div>

            <div id="yoklama-date-view-section" style="margin-top:30px;"></div>
            <div id="yoklama-stats-section" style="margin-top:30px;"></div>
            <div id="yoklama-manage-section" style="margin-top:30px;"></div>
        </div>
    </div>
</div>

<!-- Maç Sonucu Modal -->
<div id="edit-modal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);padding:20px;overflow-y:auto;z-index:1000;">
    <div style="max-width:600px;margin:50px auto;background:white;padding:30px;border-radius:15px;">
        <h2 style="color:#8B0000;margin-bottom:20px;">Maç Sonucu Gir</h2>
        <div id="edit-title" style="font-size:1.1em;margin-bottom:20px;font-weight:600;"></div>
        <div class="form-row">
            <div class="form-group">
                <label id="edit-team1-label"></label>
                <input type="number" id="edit-score1" min="0" max="3" placeholder="Set sayısı (0-3)">
            </div>
            <div class="form-group">
                <label id="edit-team2-label"></label>
                <input type="number" id="edit-score2" min="0" max="3" placeholder="Set sayısı (0-3)">
            </div>
        </div>
        <div class="form-group">
            <label>Set Skorları (opsiyonel)</label>
            <input type="text" id="edit-sets" placeholder="Örn: 25-20, 23-25, 25-18">
        </div>
        <button id="edit-save-btn">Kaydet</button>
        <button class="btn-secondary" style="margin-top:10px;" onclick="closeModal()">İptal</button>
    </div>
</div>

<script>
    // ─── TURNUVA VERİ FONKSİYONLARI (Firebase) ───────────────────────────────
    const DEFAULT_TEAMS = {
        groupA: ["Anadolu Yıldızları","İstanbul Fırtınası","Ankara Şampiyonları","Ege Aslanları","Marmara Gücü"],
        groupB: ["Karadeniz Kartalları","Akdeniz Dalgası","Trakya Pars","Boğaziçi United","Avrupa Yakası SK"]
    };

    function loadData() {
        return database.ref('turnuva').once('value').then(snapshot => {
            const data = snapshot.val();
            if (!data) {
                const initial = { teams: DEFAULT_TEAMS, matches: [] };
                database.ref('turnuva').set(initial);
                return initial;
            }
            if (data.matches && !Array.isArray(data.matches)) {
                data.matches = Object.values(data.matches);
            } else if (!data.matches) {
                data.matches = [];
            }
            if (!data.teams) data.teams = DEFAULT_TEAMS;
            if (!data.teams.groupA) data.teams.groupA = [];
            if (!data.teams.groupB) data.teams.groupB = [];
            return data;
        });
    }

    function saveData(data) {
        if (Array.isArray(data.matches)) {
            data.matches = data.matches.filter(m => m != null);
        }
        return database.ref('turnuva').set(data)
            .then(() => console.log('✅ Turnuva verisi kaydedildi'))
            .catch(err => console.error('❌ Kaydetme hatası:', err));
    }
</script>

<script>
    // ─── GİRİŞ ───────────────────────────────────────────────────────────────
    const ADMIN_PASS = 'vaveyla2026';
    const COACH_PASS = 'hoca2026';
    let userRole = '';
    // Düzenlenen maçın Firebase key'ini sakla
    let editingMatchKey = null;

    document.getElementById('login-form').addEventListener('submit', (e) => {
        e.preventDefault();
        const pw = document.getElementById('password').value;
        if (pw === ADMIN_PASS) {
            userRole = 'admin';
            showPanel();
            showAdminView();
        } else if (pw === COACH_PASS) {
            userRole = 'coach';
            showPanel();
            showCoachView();
        } else {
            document.getElementById('login-error').textContent = 'Yanlış şifre!';
        }
    });

    function showPanel() {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('admin-panel').style.display = 'block';
        loadAdmin();
    }

    function showAdminView() {
        document.querySelectorAll('#admin-tabs button').forEach(b => b.style.display = '');
        document.getElementById('panel-title').textContent = '🏐 Admin Paneli';
    }

    function showCoachView() {
        document.querySelectorAll('#admin-tabs button').forEach(b => {
            if (b.textContent.includes('Yoklama')) {
                b.style.display = '';
                b.click();
            } else {
                b.style.display = 'none';
            }
        });
        document.getElementById('panel-title').textContent = '📋 Yoklama Paneli';
    }

    document.getElementById('logout-btn').addEventListener('click', () => {
        document.getElementById('login-screen').style.display = 'block';
        document.getElementById('admin-panel').style.display = 'none';
        document.getElementById('password').value = '';
    });

    // ─── TAB ─────────────────────────────────────────────────────────────────
    function showTab(tab, btn) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('#admin-tabs button').forEach(b => b.classList.remove('active'));
        document.getElementById(tab + '-tab').classList.add('active');
        if (btn) btn.classList.add('active');
        if (tab === 'attendance') {
            setYoklamaTodayDate();
            const grp = document.getElementById('yoklama-group').value;
            if (grp) loadYoklamaAthletes();
        }
    }

    // ─── ADMIN YÜKLENİYOR ────────────────────────────────────────────────────
    function loadAdmin() {
        displayMatches();
        displayTeamsAdmin();
        setupMatchGroupListener();
    }

    // ─── MAÇLAR (Firebase'den) ────────────────────────────────────────────────
    function displayMatches() {
        const container = document.getElementById('matches-list');
        container.innerHTML = '<div class="loading">⏳ Yükleniyor...</div>';

        loadData().then(data => {
            if (!data.matches || data.matches.length === 0) {
                container.innerHTML = '<p style="text-align:center;color:#666;padding:20px;">Henüz maç yok.</p>';
                return;
            }

            let html = '';
            data.matches.forEach((match, i) => {
                const status = match.played ? '✅ Oynandı' : '⏳ Bekliyor';
                const score = match.played ? `${match.score1} - ${match.score2}` : 'vs';
                html += `
                    <div class="match-item">
                        <div>
                            <strong>${match.team1}</strong> ${score} <strong>${match.team2}</strong><br>
                            <small>${match.date} • ${match.group} Grubu • ${status}</small>
                        </div>
                        <div>
                            <button class="btn-secondary btn-small" onclick="editMatch(${i})">${match.played ? 'Düzenle' : 'Sonuç Gir'}</button>
                            <button class="btn-danger btn-small" onclick="deleteMatch(${i})">Sil</button>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        });
    }

    // ─── TAKIMLAR (Firebase'den) ──────────────────────────────────────────────
    function displayTeamsAdmin() {
        loadData().then(data => {
            ['A', 'B'].forEach(group => {
                const teams = data.teams['group' + group] || [];
                const container = document.getElementById('group' + group + '-list');
                let html = '';
                teams.forEach((team, i) => {
                    html += `
                        <div class="match-item">
                            <span>${team}</span>
                            <button class="btn-danger btn-small" onclick="deleteTeam('${group}', ${i})">Sil</button>
                        </div>
                    `;
                });
                container.innerHTML = html || '<p style="color:#666;padding:10px;">Henüz takım yok.</p>';
            });
        });
    }

    // Grup seçilince takım dropdown'ları doldur
    function setupMatchGroupListener() {
        document.getElementById('match-group').addEventListener('change', function () {
            const group = this.value;
            if (!group) return;
            loadData().then(data => {
                const teams = data.teams['group' + group] || [];
                let opts = '<option value="">Seçiniz</option>';
                teams.forEach(t => opts += `<option value="${t}">${t}</option>`);
                document.getElementById('team1').innerHTML = opts;
                document.getElementById('team2').innerHTML = opts;
            });
        });
    }

    // ─── MAÇ EKLE ─────────────────────────────────────────────────────────────
    document.getElementById('add-match-btn').addEventListener('click', () => {
        const dateVal = document.getElementById('match-date').value;
        const group = document.getElementById('match-group').value;
        const t1 = document.getElementById('team1').value;
        const t2 = document.getElementById('team2').value;

        if (!dateVal || !group || !t1 || !t2) { alert('Tüm alanları doldurun!'); return; }
        if (t1 === t2) { alert('Aynı takım kendisiyle oynamaz!'); return; }

        const date = new Date(dateVal);
        const months = ['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];
        const dateStr = date.getDate() + ' ' + months[date.getMonth()] + ' ' + date.getFullYear();

        const match = {
            date: dateStr,
            group,
            team1: t1,
            team2: t2,
            score1: null,
            score2: null,
            sets: '',
            played: false
        };

        loadData().then(data => {
            data.matches.push(match);
            return saveData(data);
        }).then(() => {
            document.getElementById('match-date').value = '';
            document.getElementById('match-group').value = '';
            document.getElementById('team1').innerHTML = '<option value="">Önce grup seçin</option>';
            document.getElementById('team2').innerHTML = '<option value="">Önce grup seçin</option>';
            const msg = document.getElementById('success-msg');
            msg.textContent = '✅ Maç eklendi!';
            msg.style.display = 'block';
            setTimeout(() => msg.style.display = 'none', 3000);
            displayMatches();
        });
    });

    // ─── MAÇ SONUCU DÜZENLE ───────────────────────────────────────────────────
    function editMatch(index) {
        loadData().then(data => {
            const match = data.matches[index];
            editingMatchKey = index;
            document.getElementById('edit-title').textContent = match.team1 + ' vs ' + match.team2;
            document.getElementById('edit-team1-label').textContent = match.team1;
            document.getElementById('edit-team2-label').textContent = match.team2;
            document.getElementById('edit-score1').value = match.score1 ?? '';
            document.getElementById('edit-score2').value = match.score2 ?? '';
            document.getElementById('edit-sets').value = match.sets || '';
            document.getElementById('edit-modal').style.display = 'block';
        });
    }

    function closeModal() {
        document.getElementById('edit-modal').style.display = 'none';
        editingMatchKey = null;
    }

    document.getElementById('edit-save-btn').addEventListener('click', () => {
        const s1 = parseInt(document.getElementById('edit-score1').value);
        const s2 = parseInt(document.getElementById('edit-score2').value);

        if (isNaN(s1) || isNaN(s2)) { alert('Skor girin!'); return; }
        const validScores = ['3-0','3-1','3-2','0-3','1-3','2-3'];
        if (!validScores.includes(s1 + '-' + s2)) {
            alert('Geçersiz skor!\nGeçerli skorlar: 3-0, 3-1, 3-2 veya 0-3, 1-3, 2-3');
            return;
        }

        loadData().then(data => {
            data.matches[editingMatchKey].score1 = s1;
            data.matches[editingMatchKey].score2 = s2;
            data.matches[editingMatchKey].sets = document.getElementById('edit-sets').value;
            data.matches[editingMatchKey].played = true;
            return saveData(data);
        }).then(() => {
            closeModal();
            displayMatches();
            alert('✅ Sonuç Firebase\'e kaydedildi!');
        });
    });

    // ─── MAÇ SİL ─────────────────────────────────────────────────────────────
    function deleteMatch(index) {
        if (!confirm('Bu maçı silmek istediğinize emin misiniz?')) return;
        loadData().then(data => {
            data.matches.splice(index, 1);
            return saveData(data);
        }).then(() => displayMatches());
    }

    // ─── TAKIM EKLE ──────────────────────────────────────────────────────────
    ['A', 'B'].forEach(group => {
        document.getElementById('add' + group + '-btn').addEventListener('click', () => {
            const name = document.getElementById('new-team' + group).value.trim();
            if (!name) return;
            loadData().then(data => {
                if (data.teams['group' + group].includes(name)) {
                    alert('Bu takım zaten var!'); return;
                }
                data.teams['group' + group].push(name);
                return saveData(data);
            }).then(() => {
                document.getElementById('new-team' + group).value = '';
                displayTeamsAdmin();
            });
        });
    });

    // ─── TAKIM SİL ───────────────────────────────────────────────────────────
    function deleteTeam(group, index) {
        if (!confirm('Bu takımı silmek istediğinize emin misiniz?')) return;
        loadData().then(data => {
            data.teams['group' + group].splice(index, 1);
            return saveData(data);
        }).then(() => displayTeamsAdmin());
    }


    // ════════════════════════════════════════════════════════════════════════
    // YOKLAMA SİSTEMİ (Firebase Realtime DB)
    // ════════════════════════════════════════════════════════════════════════

    let currentYoklamaAttendance = {};
    let currentYoklamaGroup = '';

    // Yoklama verisini Firebase'den çek
    function loadYoklamaData() {
        return database.ref("yoklama").once("value").then(snap => {
            const d = snap.val() || {};
            if (!d.athletes || typeof d.athletes !== "object") d.athletes = {};
            // "null" string veya bozuk veri kontrolü
            if (!d.attendances || typeof d.attendances !== "object" || d.attendances === "null") {
                d.attendances = {};
            }
            Object.keys(d.attendances).forEach(k => {
                if (!d.attendances[k] || typeof d.attendances[k] !== "object") {
                    d.attendances[k] = {};
                }
            });
            return d;
        });
    }

    // Yoklama verisini Firebase'e yaz
    // Yoklama verisini Firebase'e yaz
    function saveYoklamaData(data) {
        if (!data.athletes || typeof data.athletes !== "object") data.athletes = {};
        if (!data.attendances || typeof data.attendances !== "object" || data.attendances === "null") data.attendances = {};
        // Her attendance kaydı obje olmalı
        Object.keys(data.attendances).forEach(k => {
            if (!data.attendances[k] || typeof data.attendances[k] !== "object") data.attendances[k] = {};
        });
        return database.ref("yoklama").set(data)
            .then(() => console.log("💾 Yoklama Firebase'e kaydedildi"))
            .catch(err => console.error("❌ Yoklama kaydetme hatası:", err));
    }

    function setYoklamaTodayDate() {
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('yoklama-date').value = today;
    }

    function loadYoklamaAthletes() {
        const group = document.getElementById('yoklama-group').value;
        const date = document.getElementById('yoklama-date').value;

        if (!group || !date) {
            document.getElementById('yoklama-athletes-container').innerHTML = '';
            document.getElementById('yoklama-save-section').style.display = 'none';
            return;
        }

        currentYoklamaGroup = group;
        currentYoklamaAttendance = {};
        document.getElementById('yoklama-athletes-container').innerHTML = '<div class="loading">⏳ Yükleniyor...</div>';
        // Grup değişince eski tarih görünümünü ve istatistikleri temizle
        document.getElementById('yoklama-date-view-section').innerHTML = '';
        document.getElementById('yoklama-stats-section').innerHTML = '';
        document.getElementById('yoklama-manage-section').innerHTML = '';

        loadYoklamaData().then(data => {
            if (!data.athletes[group]) data.athletes[group] = [];
            const athletes = data.athletes[group];
            const container = document.getElementById('yoklama-athletes-container');

            if (athletes.length === 0) {
                container.innerHTML = `
                    <div style="text-align:center;padding:40px;background:#f9f9f9;border-radius:10px;">
                        <div style="font-size:3em;margin-bottom:15px;">🏐</div>
                        <p style="color:#666;">Bu grupta henüz sporcu yok.</p>
                    </div>`;
                document.getElementById('yoklama-save-section').style.display = 'none';
                loadYoklamaManageSection(group);
                return;
            }

            const attendanceKey = `${group}_${date}`;
            const existing = (data.attendances && data.attendances[attendanceKey]) || {};
            currentYoklamaAttendance = { ...existing };

            let html = `
                <div class="yoklama-summary">
                    <div class="yoklama-summary-number">${athletes.length}</div>
                    <div style="font-size:1.1em;margin-top:5px;">Toplam Sporcu</div>
                </div>`;

            athletes.forEach(athlete => {
                const id = athlete.id;
                const status = currentYoklamaAttendance[id];
                const statusText = status === true ? '✓ Geldi' : status === false ? '✗ Gelmedi' : 'İşaretlenmedi';
                const statusColor = status === true ? '#28a745' : status === false ? '#dc3545' : '#999';

                html += `
                    <div class="yoklama-athlete-card">
                        <div class="yoklama-athlete-header">
                            <div>
                                <div class="yoklama-athlete-name">${athlete.fullname}</div>
                                <div class="yoklama-athlete-status" id="status-${id}" style="color:${statusColor};">${statusText}</div>
                            </div>
                            <div class="yoklama-buttons">
                                <button class="yoklama-btn ${status === true ? 'present' : ''}" id="present-${id}" onclick="markYoklamaPresent('${id}')">✓</button>
                                <button class="yoklama-btn ${status === false ? 'absent' : ''}" id="absent-${id}" onclick="markYoklamaAbsent('${id}')">✗</button>
                            </div>
                        </div>
                    </div>`;
            });

            container.innerHTML = html;
            document.getElementById('yoklama-save-section').style.display = 'block';
            loadYoklamaDateView(group, date);
            loadYoklamaStats(group);
            loadYoklamaManageSection(group);
        }).catch(err => {
            console.error('Yoklama yükleme hatası:', err);
            document.getElementById('yoklama-athletes-container').innerHTML =
                '<div style="color:#dc3545;padding:20px;">⚠️ Yükleme hatası! Sayfayı yenileyin.</div>';
        });
    }

    function markYoklamaPresent(id) {
        if (currentYoklamaAttendance[id] === true) {
            delete currentYoklamaAttendance[id];
            document.getElementById('present-' + id).classList.remove('present');
            document.getElementById('status-' + id).textContent = 'İşaretlenmedi';
            document.getElementById('status-' + id).style.color = '#999';
        } else {
            currentYoklamaAttendance[id] = true;
            document.getElementById('present-' + id).classList.add('present');
            document.getElementById('absent-' + id).classList.remove('absent');
            document.getElementById('status-' + id).textContent = '✓ Geldi';
            document.getElementById('status-' + id).style.color = '#28a745';
        }
    }

    function markYoklamaAbsent(id) {
        if (currentYoklamaAttendance[id] === false) {
            delete currentYoklamaAttendance[id];
            document.getElementById('absent-' + id).classList.remove('absent');
            document.getElementById('status-' + id).textContent = 'İşaretlenmedi';
            document.getElementById('status-' + id).style.color = '#999';
        } else {
            currentYoklamaAttendance[id] = false;
            document.getElementById('absent-' + id).classList.add('absent');
            document.getElementById('present-' + id).classList.remove('present');
            document.getElementById('status-' + id).textContent = '✗ Gelmedi';
            document.getElementById('status-' + id).style.color = '#dc3545';
        }
    }

    function saveYoklamaAttendance() {
        const group = document.getElementById('yoklama-group').value;
        const date = document.getElementById('yoklama-date').value;
        if (!group || !date) { alert('⚠️ Grup ve tarih seçin!'); return; }
        if (!currentYoklamaAttendance || Object.keys(currentYoklamaAttendance).length === 0) {
            alert('⚠️ Henüz yoklama işaretlemediniz!'); return;
        }

        loadYoklamaData().then(data => {
            // Güvenli null kontrolleri
            if (!data) data = {};
            if (!data.athletes) data.athletes = {};
            if (!data.attendances) data.attendances = {};

            const key = `${group}_${date}`;
            if (!data.attendances[key] || typeof data.attendances[key] !== 'object') {
                data.attendances[key] = {};
            }

            // Her kaydı tek tek ata (Object.assign yerine)
            Object.keys(currentYoklamaAttendance).forEach(id => {
                data.attendances[key][id] = currentYoklamaAttendance[id];
            });

            return saveYoklamaData(data);
        }).then(() => {
            let present = 0, absent = 0;
            Object.values(currentYoklamaAttendance).forEach(s => {
                if (s === true) present++;
                else if (s === false) absent++;
            });
            alert(`✅ Yoklama kaydedildi!\n\n✓ Geldi: ${present} kişi\n✗ Gelmedi: ${absent} kişi`);
            loadYoklamaDateView(group, date);
            loadYoklamaStats(group);
        }).catch(err => {
            console.error('Kaydetme hatası:', err);
            alert('⚠️ Kaydetme sırasında hata oluştu! Konsolu kontrol edin.');
        });
    }

    function loadYoklamaDateView(group, date) {
        const container = document.getElementById('yoklama-date-view-section');
        loadYoklamaData().then(data => {
            if (!data.athletes || !data.athletes[group] || data.athletes[group].length === 0) {
                container.innerHTML = ''; return;
            }
            const key = `${group}_${date}`;
            const dayAtt = data.attendances && data.attendances[key];
            if (!dayAtt || Object.keys(dayAtt).length === 0) { container.innerHTML = ''; return; }

            const dateObj = new Date(date);
            const formatted = dateObj.toLocaleDateString('tr-TR', { day: 'numeric', month: 'long', year: 'numeric' });

            // Sporcu listesi ile birlikte göster (düzenlenebilir)
            let rows = '';
            data.athletes[group].forEach(athlete => {
                const id = athlete.id;
                const s = dayAtt[id];
                if (s === undefined) return; // işaretlenmemiş, gösterme
                const isPresent = s === true;
                rows += `
                    <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #f0f0f0;">
                        <span style="font-weight:500;">${athlete.fullname}</span>
                        <div style="display:flex;align-items:center;gap:10px;">
                            <span style="color:${isPresent ? '#28a745' : '#dc3545'};font-weight:600;">
                                ${isPresent ? '✓ Geldi' : '✗ Gelmedi'}
                            </span>
                            <button onclick="toggleSingleAttendance('${group}','${date}','${id}')"
                                style="padding:5px 10px;font-size:0.8em;background:#FFD700;color:#8B0000;border:none;border-radius:5px;cursor:pointer;font-weight:bold;">
                                Değiştir
                            </button>
                            <button onclick="removeSingleAttendance('${group}','${date}','${id}')"
                                style="padding:5px 10px;font-size:0.8em;background:#dc3545;color:white;border:none;border-radius:5px;cursor:pointer;font-weight:bold;">
                                Sil
                            </button>
                        </div>
                    </div>`;
            });

            if (!rows) { container.innerHTML = ''; return; }

            container.innerHTML = `
                <div style="background:#f9f9f9;padding:20px;border-radius:10px;">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;flex-wrap:wrap;gap:10px;">
                        <h3 style="color:#8B0000;">📅 ${formatted} Antrenmanı</h3>
                        <button onclick="deleteWholeDay('${group}','${date}')"
                            style="padding:8px 15px;background:#dc3545;color:white;border:none;border-radius:8px;cursor:pointer;font-weight:bold;font-size:0.9em;">
                            🗑️ Bu günü tamamen sil
                        </button>
                    </div>
                    <div style="background:white;padding:15px;border-radius:10px;">
                        ${rows}
                    </div>
                </div>`;
        });
    }

    // Tek kişinin işaretini değiştir (geldi↔gelmedi)
    function toggleSingleAttendance(group, date, athleteId) {
        loadYoklamaData().then(data => {
            const key = `${group}_${date}`;
            if (!data.attendances[key]) return;
            data.attendances[key][athleteId] = !data.attendances[key][athleteId];
            return saveYoklamaData(data);
        }).then(() => {
            loadYoklamaDateView(group, date);
            loadYoklamaStats(group);
        });
    }

    // Tek kişinin kaydını sil
    function removeSingleAttendance(group, date, athleteId) {
        if (!confirm('Bu kişinin bu güne ait kaydı silinecek. Emin misiniz?')) return;
        loadYoklamaData().then(data => {
            const key = `${group}_${date}`;
            if (!data.attendances[key]) return;
            delete data.attendances[key][athleteId];
            // Gün tamamen boşaldıysa günü de sil
            if (Object.keys(data.attendances[key]).length === 0) {
                delete data.attendances[key];
            }
            return saveYoklamaData(data);
        }).then(() => {
            loadYoklamaDateView(group, date);
            loadYoklamaStats(group);
            // currentYoklamaAttendance'dan da kaldır
            delete currentYoklamaAttendance[athleteId];
        });
    }

    // Tüm günü sil
    function deleteWholeDay(group, date) {
        const dateObj = new Date(date);
        const formatted = dateObj.toLocaleDateString('tr-TR', { day: 'numeric', month: 'long', year: 'numeric' });
        if (!confirm(`${formatted} tarihine ait TÜM yoklama silinecek. Emin misiniz?`)) return;
        loadYoklamaData().then(data => {
            const key = `${group}_${date}`;
            if (data.attendances && data.attendances[key]) {
                delete data.attendances[key];
            }
            return saveYoklamaData(data);
        }).then(() => {
            currentYoklamaAttendance = {};
            loadYoklamaDateView(group, date);
            loadYoklamaStats(group);
            loadYoklamaAthletes();
            alert('✅ Yoklama silindi!');
        });
    }

    function loadYoklamaStats(group) {
        const container = document.getElementById('yoklama-stats-section');
        loadYoklamaData().then(data => {
            if (!data.athletes || !data.athletes[group] || data.athletes[group].length === 0) {
                container.innerHTML = ''; return;
            }
            const groupAtts = {};
            Object.keys(data.attendances || {}).forEach(k => {
                if (k.startsWith(group + '_')) groupAtts[k] = data.attendances[k];
            });
            const totalDays = Object.keys(groupAtts).length;
            if (totalDays === 0) { container.innerHTML = ''; return; }

            let html = `<div style="background:#f9f9f9;padding:20px;border-radius:10px;">
                <h3 style="color:#8B0000;margin-bottom:15px;">📊 İstatistikler</h3>
                <p style="margin-bottom:15px;color:#666;">Toplam ${totalDays} yoklama günü</p>`;

            data.athletes[group].forEach(athlete => {
                let present = 0, total = 0;
                const history = [];
                Object.keys(groupAtts).sort().reverse().forEach(k => {
                    const day = groupAtts[k];
                    if (day[athlete.id] !== undefined) {
                        total++;
                        const s = day[athlete.id];
                        if (s === true) present++;
                        const d = new Date(k.split('_')[1]).toLocaleDateString('tr-TR', { day: 'numeric', month: 'short', year: 'numeric' });
                        history.push({ date: d, status: s });
                    }
                });
                const pct = total > 0 ? Math.round((present / total) * 100) : 0;
                html += `
                    <div class="stat-card" style="cursor:pointer;" onclick="toggleAthleteStats('${athlete.id}')">
                        <div style="display:flex;justify-content:space-between;align-items:center;">
                            <strong>${athlete.fullname}</strong>
                            <div style="display:flex;align-items:center;gap:15px;">
                                <span style="color:#28a745;">✓${present}</span>/<span style="color:#dc3545;">✗${total-present}</span>
                                <strong>${pct}%</strong>
                                <span id="arrow-${athlete.id}">▼</span>
                            </div>
                        </div>
                        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
                        <div id="athlete-history-${athlete.id}" style="display:none;margin-top:15px;padding-top:15px;border-top:2px solid #eee;">
                            ${history.map(r => `<div style="padding:8px;background:white;border-radius:6px;margin-bottom:6px;display:flex;justify-content:space-between;">
                                <span>${r.date}</span>
                                <span style="color:${r.status?'#28a745':'#dc3545'};font-weight:600;">${r.status?'✓ Geldi':'✗ Gelmedi'}</span>
                            </div>`).join('') || '<p style="color:#999;">Henüz kayıt yok.</p>'}
                        </div>
                    </div>`;
            });
            html += '</div>';
            container.innerHTML = html;
        });
    }

    function toggleAthleteStats(id) {
        const h = document.getElementById('athlete-history-' + id);
        const a = document.getElementById('arrow-' + id);
        if (h.style.display === 'none') { h.style.display = 'block'; a.style.transform = 'rotate(180deg)'; }
        else { h.style.display = 'none'; a.style.transform = ''; }
    }

    function loadYoklamaManageSection(group) {
        const container = document.getElementById('yoklama-manage-section');
        if (!container) return;

        loadYoklamaData().then(data => {
            if (!data.athletes[group]) data.athletes[group] = [];
            const athletes = data.athletes[group];

            let html = `<div style="background:#f9f9f9;padding:20px;border-radius:10px;">
                <h3 style="color:#8B0000;margin-bottom:15px;">👥 Sporcu Yönetimi (${athletes.length})</h3>`;

            athletes.forEach((athlete, i) => {
                html += `
                    <div class="match-item">
                        <div id="disp-${i}"><strong>${athlete.fullname}</strong></div>
                        <div id="edit-${i}" style="display:none;flex:1;">
                            <input type="text" id="ainput-${i}" value="${athlete.fullname}" style="width:100%;margin:0;">
                        </div>
                        <div style="display:flex;gap:8px;">
                            <button class="btn-secondary btn-small" id="ebtn-${i}" onclick="editYoklamaAthlete('${group}',${i})">Düzenle</button>
                            <button class="btn-secondary btn-small" id="sbtn-${i}" onclick="saveYoklamaAthlete('${group}',${i})" style="display:none;">Kaydet</button>
                            <button class="btn-danger btn-small" onclick="deleteYoklamaAthlete('${group}',${i})">Sil</button>
                        </div>
                    </div>`;
            });

            html += `
                <div style="display:flex;gap:10px;margin-top:15px;">
                    <input type="text" id="yoklama-new-fullname-${group}" placeholder="İsim Soyisim" style="flex:1;">
                    <button class="btn-small" onclick="addYoklamaAthlete('${group}')">➕ Ekle</button>
                </div></div>`;

            container.innerHTML = html;
        });
    }

    function editYoklamaAthlete(group, i) {
        document.getElementById('disp-' + i).style.display = 'none';
        document.getElementById('edit-' + i).style.display = 'block';
        document.getElementById('ebtn-' + i).style.display = 'none';
        document.getElementById('sbtn-' + i).style.display = 'inline-block';
        document.getElementById('ainput-' + i).focus();
    }

    function saveYoklamaAthlete(group, i) {
        const name = document.getElementById('ainput-' + i).value.trim();
        if (!name) { alert('İsim boş olamaz!'); return; }
        loadYoklamaData().then(data => {
            data.athletes[group][i].fullname = name;
            data.athletes[group].sort((a, b) => a.fullname.localeCompare(b.fullname, 'tr'));
            return saveYoklamaData(data);
        }).then(() => {
            alert('✅ Güncellendi!');
            loadYoklamaManageSection(group);
            loadYoklamaAthletes();
        });
    }

    function addYoklamaAthlete(group) {
        const fullname = document.getElementById('yoklama-new-fullname-' + group).value.trim();
        if (!fullname) return;
        loadYoklamaData().then(data => {
            if (!data.athletes[group]) data.athletes[group] = [];
            const id = Date.now() + '_' + Math.random().toString(36).substr(2, 9);
            data.athletes[group].push({ id, fullname });
            data.athletes[group].sort((a, b) => a.fullname.localeCompare(b.fullname, 'tr'));
            return saveYoklamaData(data);
        }).then(() => {
            alert('✅ Sporcu eklendi!');
            document.getElementById('yoklama-new-fullname-' + group).value = '';
            loadYoklamaAthletes();
        });
    }

    function deleteYoklamaAthlete(group, i) {
        if (!confirm('Bu sporcuyu silmek istediğinize emin misiniz?')) return;
        loadYoklamaData().then(data => {
            const deletedId = data.athletes[group][i].id;
            data.athletes[group].splice(i, 1);
            Object.keys(data.attendances || {}).forEach(k => {
                if (k.startsWith(group + '_')) delete data.attendances[k][deletedId];
            });
            return saveYoklamaData(data);
        }).then(() => {
            alert('✅ Sporcu silindi!');
            loadYoklamaAthletes();
        });
    }

    // Firebase realtime: yoklama başka cihazdan güncellenince yansıt
    database.ref('yoklama').on('value', () => {
        const grp = document.getElementById('yoklama-group')?.value;
        const date = document.getElementById('yoklama-date')?.value;
        const tab = document.getElementById('attendance-tab');
        if (tab && tab.classList.contains('active') && grp && date) {
            loadYoklamaDateView(grp, date);
            loadYoklamaStats(grp);
        }
    });
</script>
</body>
</html>
