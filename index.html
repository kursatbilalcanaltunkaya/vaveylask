<script>
// Seçili grupları sakla
const activeGroups = { takimlar: null, 'puan-durumu': null, fikstur: null, sonuclar: null };
let ustTurView = 'bracket'; // 'bracket' veya 'list'
let globalData = null;

function showSection(id, btn) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    if (btn) btn.classList.add('active');
}

// Voleybol puan hesaplama: 3-0/3-1 → 3 puan | 3-2 → 2 puan | 2-3 → 1 puan | 0-3/1-3 → 0 puan
function calcPts(s1, s2) {
    s1 = parseInt(s1); s2 = parseInt(s2);
    if (s1 > s2) return s1 - s2 >= 2 && (s1 === 3 && s2 <= 1) ? { t1: 3, t2: 0 }
                      : (s1 === 3 && s2 === 2) ? { t1: 2, t2: 1 } : { t1: 3, t2: 0 };
    else         return s2 - s1 >= 2 && (s2 === 3 && s1 <= 1) ? { t1: 0, t2: 3 }
                      : (s2 === 3 && s1 === 2) ? { t1: 1, t2: 2 } : { t1: 0, t2: 3 };
}

// Daha temiz voleybol puanlaması: kazanan 3-0 veya 3-1 → 3p, 3-2 → 2p; kaybeden 3-2 → 1p, diğer → 0p
function volleyPts(s1, s2) {
    s1 = parseInt(s1); s2 = parseInt(s2);
    if (s1 === 3) {
        if (s2 <= 1) return { t1: 3, t2: 0 };   // 3-0 veya 3-1
        if (s2 === 2) return { t1: 2, t2: 1 };   // 3-2
    } else if (s2 === 3) {
        if (s1 <= 1) return { t1: 0, t2: 3 };   // 0-3 veya 1-3
        if (s1 === 2) return { t1: 1, t2: 2 };   // 2-3
    }
    return { t1: 0, t2: 0 };
}

function getGroups(data) {
    const set = new Set();
    // groups array'den
    if (data.groups) {
        const grpArr = Array.isArray(data.groups) ? data.groups : Object.values(data.groups);
        grpArr.forEach(g => { if (g) set.add(String(g)); });
    }
    // teams objelerinden (groupA, groupB, groupC...)
    if (data.teams && typeof data.teams === 'object') {
        Object.keys(data.teams).forEach(k => {
            if (k.startsWith('group')) {
                const g = k.replace('group', '');
                const arr = data.teams[k];
                const len = Array.isArray(arr) ? arr.length : (arr ? Object.keys(arr).length : 0);
                if (len > 0) set.add(g);
            }
        });
    }
    // maçlardan
    (data.matches||[]).forEach(m => { if (m && m.group) set.add(String(m.group)); });
    // hiç bulunamazsa default
    if (!set.size) { set.add('A'); set.add('B'); }
    return [...set].sort();
}

function getTeams(g, data) {
    if (!data.teams) return [];
    const arr = data.teams['group'+g];
    if (!arr) return [];
    return Array.isArray(arr) ? arr : Object.values(arr);
}

function calcStandings(g, data) {
    const st = {};
    getTeams(g, data).forEach(t => { st[t] = { played:0, won:0, lost:0, sw:0, sl:0, pts:0 }; });
    (data.matches||[]).filter(m => m.group===g && m.played).forEach(m => {
        if (!st[m.team1]) st[m.team1] = { played:0, won:0, lost:0, sw:0, sl:0, pts:0 };
        if (!st[m.team2]) st[m.team2] = { played:0, won:0, lost:0, sw:0, sl:0, pts:0 };
        const p = volleyPts(m.score1, m.score2);
        const s1 = parseInt(m.score1), s2 = parseInt(m.score2);
        st[m.team1].played++; st[m.team2].played++;
        st[m.team1].sw += s1; st[m.team1].sl += s2;
        st[m.team2].sw += s2; st[m.team2].sl += s1;
        st[m.team1].pts += p.t1; st[m.team2].pts += p.t2;
        if (s1 > s2) { st[m.team1].won++; st[m.team2].lost++; }
        else { st[m.team2].won++; st[m.team1].lost++; }
    });
    return Object.entries(st)
        .map(([team, s]) => ({ team, ...s, avg: s.sw - s.sl }))
        .sort((a, b) => b.pts !== a.pts ? b.pts - a.pts : b.avg - a.avg);
}

// Grup sekmeleri oluştur
function buildGroupTabs(tabsId, section, groups, onSelect) {
    const container = document.getElementById(tabsId);
    if (!groups.length) { container.innerHTML = ''; return; }

    // Eğer aktif grup henüz seçilmemişse ilkini seç
    if (!activeGroups[section] || !groups.includes(activeGroups[section])) {
        activeGroups[section] = groups[0];
    }

    container.innerHTML = groups.map(g =>
        `<button class="group-tab ${activeGroups[section]===g?'active':''}" onclick="selectGroup('${section}','${g}')">${g} Grubu</button>`
    ).join('');
}

function selectGroup(section, group) {
    activeGroups[section] = group;
    if (globalData) renderSection(section, globalData);
}

function renderSection(section, data) {
    const groups = getGroups(data);
    if (!groups.length) {
        const containers = { takimlar:'teams-container', 'puan-durumu':'standings-container', fikstur:'fixtures-container', sonuclar:'results-container' };
        if (containers[section]) document.getElementById(containers[section]).innerHTML = '<p class="empty-msg">Henüz veri yok.</p>';
        return;
    }
    const g = activeGroups[section] || groups[0];

    // Joker hesabı (tüm 3.ler arasından en iyi 2)
    const direct = 2;
    const wildcards = 2;
    const thirds = [];
    groups.forEach(gr => {
        const st = calcStandings(gr, data);
        if (st.length >= 3) thirds.push({ ...st[2], gr });
    });
    thirds.sort((a, b) => b.pts !== a.pts ? b.pts - a.pts : b.avg - a.avg);
    const wildSet = new Set(thirds.slice(0, wildcards).map(t => t.team));

    if (section === 'takimlar') {
        buildGroupTabs('teams-group-tabs', section, groups, g);
        const teams = getTeams(g, data);
        if (!teams.length) { document.getElementById('teams-container').innerHTML = '<p class="empty-msg">Bu grupta henüz takım yok.</p>'; return; }
        document.getElementById('teams-container').innerHTML = teams.map(t => `<div class="team-card">🏐 ${t}</div>`).join('');
    }

    else if (section === 'puan-durumu') {
        buildGroupTabs('standings-group-tabs', section, groups, g);
        const st = calcStandings(g, data);

        let html = `<div class="qualify-banner">
            🏆 <strong>Son 8'e Çıkış:</strong> Her gruptan ilk <strong>${direct}</strong> takım direkt çıkar.
            ${wildcards > 0 ? `Tüm grupların 3.'leri arasından en iyi <strong>${wildcards}</strong> takım da çıkar.` : ''}
            <div class="qualify-legend">
                <span class="q-green">🟢 Direkt çıkar</span>
                ${wildcards > 0 ? '<span class="q-yellow">🟡 Joker ile çıkabilir</span>' : ''}
            </div>
        </div>`;

        html += `<table class="standings-table">
            <thead><tr>
                <th>#</th><th>Takım</th><th>O</th><th>G</th><th>M</th>
                <th title="Kazanılan Set">KS</th><th title="Kaybedilen Set">MS</th>
                <th title="Set Averajı">Avg</th><th>P</th>
            </tr></thead><tbody>`;

        st.forEach((t, i) => {
            const isDirect = i < direct;
            const isWild = !isDirect && wildSet.has(t.team);
            const rc = i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':'';
            const qc = isDirect?'qualified-row':isWild?'maybe-row':'';
            const badge = isDirect?' 🟢':isWild?' 🟡':'';
            html += `<tr class="${rc} ${qc}">
                <td><strong>${i+1}</strong></td>
                <td>${t.team}${badge}</td>
                <td>${t.played}</td><td>${t.won}</td><td>${t.lost}</td>
                <td>${t.sw}</td><td>${t.sl}</td>
                <td>${t.avg > 0 ? '+' : ''}${t.avg}</td>
                <td><strong>${t.pts}</strong></td>
            </tr>`;
        });

        html += `</tbody></table>
            <p style="color:#999;font-size:0.78em;margin-top:8px;">
                O:Oynanan &nbsp; G:Galibiyet &nbsp; M:Mağlubiyet &nbsp; KS:Kazanılan Set &nbsp; MS:Kaybedilen Set &nbsp; Avg:Set Averajı &nbsp; P:Puan<br>
                Puanlama: 3-0/3-1 kazanma → 3P &nbsp;|&nbsp; 3-2 kazanma → 2P &nbsp;|&nbsp; 2-3 kaybetme → 1P &nbsp;|&nbsp; 0-3/1-3 kaybetme → 0P
            </p>`;

        document.getElementById('standings-container').innerHTML = html;
    }

    else if (section === 'fikstur') {
        buildGroupTabs('fixtures-group-tabs', section, groups, g);
        const ms = (data.matches||[]).filter(m => m.group === g);
        if (!ms.length) { document.getElementById('fixtures-container').innerHTML = '<p class="empty-msg">Bu grupta henüz maç eklenmemiş.</p>'; return; }
        document.getElementById('fixtures-container').innerHTML = ms.map(m => `
            <div class="fixture-card">
                <div class="fixture-meta">
                    <span class="fixture-badge">📅 ${m.date}</span>
                    ${m.time ? `<span class="fixture-badge">🕐 ${m.time}</span>` : ''}
                    ${m.venue ? `<span class="fixture-badge salon">📍 ${m.venue}</span>` : ''}
                </div>
                <div class="fixture-teams">
                    <span class="fixture-team">${m.team1}</span>
                    <span class="fixture-vs">vs</span>
                    <span class="fixture-team right">${m.team2}</span>
                </div>
            </div>`).join('');
    }

    else if (section === 'sonuclar') {
        buildGroupTabs('results-group-tabs', section, groups, g);
        const played = (data.matches||[]).filter(m => m.group === g && m.played);
        if (!played.length) { document.getElementById('results-container').innerHTML = '<p class="empty-msg">Bu grupta henüz oynanmış maç yok.</p>'; return; }
        document.getElementById('results-container').innerHTML = played.map(m => {
            const setList = m.sets ? m.sets.split(',').map(s => s.trim()).filter(Boolean) : [];
            const setsHtml = setList.length ? `<div class="sets-grid">${setList.map((s,i) =>
                `<div class="set-box"><span class="set-label">Set ${i+1}</span><span class="set-score">${s}</span></div>`).join('')}</div>` : '';
            return `<div class="result-card">
                <div class="result-main">
                    <span class="result-team">${m.team1}</span>
                    <span class="result-score">${m.score1} – ${m.score2}</span>
                    <span class="result-team right">${m.team2}</span>
                </div>
                ${setsHtml}
            </div>`;
        }).join('');
    }
}


const ROUNDS = [
    { key: "QF", label: "Ceyrek Final", short: "CF" },
    { key: "SF", label: "Yari Final",   short: "YF" },
    { key: "F",  label: "Final",        short: "F"  },
    { key: "TP", label: "3. luk Maci",  short: "3." }
];

function renderUstTur(data) {
    const container = document.getElementById('ust-tur-container');
    const playoffs = data.playoffs || [];

    if (!playoffs.length) {
        container.innerHTML = '<p class="empty-msg">Henüz üst tur maçı eklenmemiş.</p>';
        return;
    }

    // Hangi roundlar var?
    const roundsPresent = ROUNDS.filter(r => playoffs.some(m => m.round === r.key));

    // Toggle butonları
    let html = `<div class="view-toggle">
        <button class="view-btn ${ustTurView==='bracket'?'active':''}" onclick="setUstTurView('bracket')">🏆 Bracket</button>
        <button class="view-btn ${ustTurView==='list'?'active':''}" onclick="setUstTurView('list')">📋 Liste</button>
    </div>`;

    if (ustTurView === 'bracket') {
        html += '<div class="bracket-container"><div class="bracket">';
        roundsPresent.forEach(r => {
            const ms = playoffs.filter(m => m.round === r.key);
            html += `<div class="bracket-round">
                <div class="bracket-round-title">${r.label}</div>
                <div class="bracket-matches">`;
            ms.forEach(m => {
                const played = m.played;
                const s1 = parseInt(m.score1), s2 = parseInt(m.score2);
                const w1 = played && s1 > s2, w2 = played && s2 > s1;
                html += `<div class="bracket-match ${played?'played':''}">
                    <div class="bracket-team ${w1?'winner':''}">
                        <span class="bracket-team-name ${!m.team1?'bracket-tbd':''}">${m.team1||'TBD'}</span>
                        <span class="bracket-team-score">${played?s1:''}</span>
                    </div>
                    <div class="bracket-team ${w2?'winner':''}">
                        <span class="bracket-team-name ${!m.team2?'bracket-tbd':''}">${m.team2||'TBD'}</span>
                        <span class="bracket-team-score">${played?s2:''}</span>
                    </div>
                </div>`;
            });
            html += '</div></div>';
        });
        html += '</div></div>';
    } else {
        // Liste görünümü - round sırasıyla
        roundsPresent.forEach(r => {
            const ms = playoffs.filter(m => m.round === r.key);
            ms.forEach(m => {
                const setList = m.sets ? m.sets.split(',').map(s=>s.trim()).filter(Boolean) : [];
                const setsHtml = setList.length ? `<div class="sets-grid" style="margin-top:10px;">${
                    setList.map((s,i)=>`<div class="set-box"><span class="set-label">Set ${i+1}</span><span class="set-score">${s}</span></div>`).join('')
                }</div>` : '';
                html += `<div class="playoff-card">
                    <span class="playoff-round-label">${r.label}</span>
                    ${m.date||m.time||m.venue ? `<div class="playoff-meta">
                        ${m.date?'📅 '+m.date:''} ${m.time?'🕐 '+m.time:''} ${m.venue?'📍 '+m.venue:''}
                    </div>` : ''}
                    <div class="playoff-main">
                        <span class="playoff-team">${m.team1||'TBD'}</span>
                        ${m.played
                            ? `<span class="playoff-score">${m.score1} – ${m.score2}</span>`
                            : `<span class="playoff-vs">vs</span>`}
                        <span class="playoff-team right">${m.team2||'TBD'}</span>
                    </div>
                    ${setsHtml}
                </div>`;
            });
        });
    }

    container.innerHTML = html;
}

function setUstTurView(v) {
    ustTurView = v;
    if (globalData) renderUstTur(globalData);
}

function renderAll(data) {
    globalData = data;
    ['takimlar', 'puan-durumu', 'fikstur', 'sonuclar'].forEach(s => renderSection(s, data));
    renderUstTur(data);
}

window.addEventListener('load', () => {
    database.ref('turnuva').on('value', snap => {
        const data = snap.val();
        if (!data) return;
        if (data.matches && !Array.isArray(data.matches)) data.matches = Object.values(data.matches);
        else if (!data.matches) data.matches = [];
        if (data.playoffs && !Array.isArray(data.playoffs)) data.playoffs = Object.values(data.playoffs);
        else if (!data.playoffs) data.playoffs = [];
        renderAll(data);
    });
});
</script>
</body>
</html>
