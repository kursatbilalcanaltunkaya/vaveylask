<script>
// Seçili grupları sakla
const activeGroups = { takimlar: null, 'puan-durumu': null, fikstur: null, sonuclar: null };
let ustTurView = 'bracket'; // 'bracket' veya 'list'
let globalData = null;

function showSection(id, btn) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    if (btn) btn.classList.add('active');
}

// Voleybol puan hesaplama: 3-0/3-1 → 3 puan | 3-2 → 2 puan | 2-3 → 1 puan | 0-3/1-3 → 0 puan
function calcPts(s1, s2) {
    s1 = parseInt(s1); s2 = parseInt(s2);
    if (s1 > s2) return s1 - s2 >= 2 && (s1 === 3 && s2 <= 1) ? { t1: 3, t2: 0 }
                      : (s1 === 3 && s2 === 2) ? { t1: 2, t2: 1 } : { t1: 3, t2: 0 };
    else         return s2 - s1 >= 2 && (s2 === 3 && s1 <= 1) ? { t1: 0, t2: 3 }
                      : (s2 === 3 && s1 === 2) ? { t1: 1, t2: 2 } : { t1: 0, t2: 3 };
}

// Daha temiz voleybol puanlaması: kazanan 3-0 veya 3-1 → 3p, 3-2 → 2p; kaybeden 3-2 → 1p, diğer → 0p
function volleyPts(s1, s2) {
    s1 = parseInt(s1); s2 = parseInt(s2);
    if (s1 === 3) {
        if (s2 <= 1) return { t1: 3, t2: 0 };   // 3-0 veya 3-1
        if (s2 === 2) return { t1: 2, t2: 1 };   // 3-2
    } else if (s2 === 3) {
        if (s1 <= 1) return { t1: 0, t2: 3 };   // 0-3 veya 1-3
        if (s1 === 2) return { t1: 1, t2: 2 };   // 2-3
    }
    return { t1: 0, t2: 0 };
}

function getGroups(data) {
    const set = new Set();
    // groups array'den
    if (data.groups) {
        const grpArr = Array.isArray(data.groups) ? data.groups : Object.values(data.groups);
        grpArr.forEach(g => { if (g) set.add(String(g)); });
    }
    // teams objelerinden (groupA, groupB, groupC...)
    if (data.teams && typeof data.teams === 'object') {
        Object.keys(data.teams).forEach(k => {
            if (k.startsWith('group')) {
                const g = k.replace('group', '');
                const arr = data.teams[k];
                const len = Array.isArray(arr) ? arr.length : (arr ? Object.keys(arr).length : 0);
                if (len > 0) set.add(g);
            }
        });
    }
    // maçlardan
    (data.matches||[]).forEach(m => { if (m && m.group) set.add(String(m.group)); });
    // hiç bulunamazsa default
    if (!set.size) { set.add('A'); set.add('B'); }
    return [...set].sort();
}

function getTeams(g, data) {
    if (!data.teams) return [];
    const arr = data.teams['group'+g];
    if (!arr) return [];
    return Array.isArray(arr) ? arr : Object.values(arr);
}

function calcStandings(g, data) {
    const st = {};
    getTeams(g, data).forEach(t => { st[t] = { played:0, won:0, lost:0, sw:0, sl:0, pts:0 }; });
    const groupMatches = (data.matches||[]).filter(m => m.group===g && m.played);
    groupMatches.forEach(m => {
        if (!st[m.team1]) st[m.team1] = { played:0, won:0, lost:0, sw:0, sl:0, pts:0 };
        if (!st[m.team2]) st[m.team2] = { played:0, won:0, lost:0, sw:0, sl:0, pts:0 };
        const p = volleyPts(m.score1, m.score2);
        const s1 = parseInt(m.score1), s2 = parseInt(m.score2);
        st[m.team1].played++; st[m.team2].played++;
        st[m.team1].sw += s1; st[m.team1].sl += s2;
        st[m.team2].sw += s2; st[m.team2].sl += s1;
        st[m.team1].pts += p.t1; st[m.team2].pts += p.t2;
        if (s1 > s2) { st[m.team1].won++; st[m.team2].lost++; }
        else { st[m.team2].won++; st[m.team1].lost++; }
    });

    // Kendi aralarındaki maç sonuçları (tiebreaker için)
    function getH2H(teamA, teamB) {
        const h = { pts:{[teamA]:0,[teamB]:0}, sw:{[teamA]:0,[teamB]:0}, sl:{[teamA]:0,[teamB]:0} };
        groupMatches.filter(m => (m.team1===teamA&&m.team2===teamB)||(m.team1===teamB&&m.team2===teamA)).forEach(m => {
            const p = volleyPts(m.score1, m.score2);
            const s1 = parseInt(m.score1), s2 = parseInt(m.score2);
            if (m.team1===teamA) {
                h.pts[teamA]+=p.t1; h.pts[teamB]+=p.t2;
                h.sw[teamA]+=s1; h.sw[teamB]+=s2;
                h.sl[teamA]+=s2; h.sl[teamB]+=s1;
            } else {
                h.pts[teamA]+=p.t2; h.pts[teamB]+=p.t1;
                h.sw[teamA]+=s2; h.sw[teamB]+=s1;
                h.sl[teamA]+=s1; h.sl[teamB]+=s2;
            }
        });
        return h;
    }

    const teams = Object.entries(st).map(([team, s]) => ({
        team, ...s,
        avg: s.sw - s.sl,
        setRatio: s.sl > 0 ? s.sw / s.sl : (s.sw > 0 ? 999 : 0)
    }));

    teams.sort((a, b) => {
        // 1. Puan
        if (b.pts !== a.pts) return b.pts - a.pts;
        // 2. Kazanılan maç sayısı
        if (b.won !== a.won) return b.won - a.won;
        // 3. Set oranı (sw/sl)
        if (Math.abs(b.setRatio - a.setRatio) > 0.0001) return b.setRatio - a.setRatio;
        // 4. Karşılıklı maç puanı (h2h)
        const h = getH2H(a.team, b.team);
        if (h.pts[b.team] !== h.pts[a.team]) return h.pts[b.team] - h.pts[a.team];
        // 5. Karşılıklı set oranı
        const hrA = h.sl[a.team] > 0 ? h.sw[a.team]/h.sl[a.team] : (h.sw[a.team] > 0 ? 999 : 0);
        const hrB = h.sl[b.team] > 0 ? h.sw[b.team]/h.sl[b.team] : (h.sw[b.team] > 0 ? 999 : 0);
        return hrB - hrA;
    });

    return teams;
}

// Grup sekmeleri oluştur
function buildGroupTabs(tabsId, section, groups, hasPlayoffs) {
    const container = document.getElementById(tabsId);
    if (!container) return;

    // Aktif grubu belirle
    if (!activeGroups[section] || (!groups.includes(activeGroups[section]) && activeGroups[section] !== '__playoff__')) {
        activeGroups[section] = groups[0] || null;
    }

    let html = groups.map(g =>
        `<button class="group-tab ${activeGroups[section]===g?'active':''}" onclick="selectGroup('${section}','${g}')">${g} Grubu</button>`
    ).join('');

    // Fikstür ve Sonuçlar sekmelerinde Final Four butonu
    if (hasPlayoffs && (section === 'fikstur' || section === 'sonuclar')) {
        html += `<button class="group-tab playoff-tab ${activeGroups[section]==='__playoff__'?'active':''}"
            onclick="selectGroup('${section}','__playoff__')">🏆 Final Four</button>`;
    }

    container.innerHTML = html;
}

function selectGroup(section, group) {
    activeGroups[section] = group;
    if (globalData) renderSection(section, globalData);
}

function renderSection(section, data) {
    const groups = getGroups(data);
    if (!groups.length) {
        const containers = { takimlar:'teams-container', 'puan-durumu':'standings-container', fikstur:'fixtures-container', sonuclar:'results-container' };
        if (containers[section]) document.getElementById(containers[section]).innerHTML = '<p class="empty-msg">Henüz veri yok.</p>';
        return;
    }
    const g = activeGroups[section] || groups[0];

    // Joker hesabı (tüm 3.ler arasından en iyi 2)
    const direct = 2;
    const wildcards = 0;
    const thirds = [];
    groups.forEach(gr => {
        const st = calcStandings(gr, data);
        if (st.length >= 3) thirds.push({ ...st[2], gr });
    });
    thirds.sort((a, b) => b.pts !== a.pts ? b.pts - a.pts : b.avg - a.avg);
    const wildSet = new Set(thirds.slice(0, wildcards).map(t => t.team));

    if (section === 'takimlar') {
        buildGroupTabs('teams-group-tabs', section, groups, false);
        const teams = getTeams(g, data);
        if (!teams.length) { document.getElementById('teams-container').innerHTML = '<p class="empty-msg">Bu grupta henüz takım yok.</p>'; return; }
        document.getElementById('teams-container').innerHTML = teams.map(t => `<div class="team-card">🏐 ${t}</div>`).join('');
    }

    else if (section === 'puan-durumu') {
        buildGroupTabs('standings-group-tabs', section, groups, false);
        const st = calcStandings(g, data);

        let html = `<div class="qualify-banner">
            🏆 <strong>Final Four'a Çıkış:</strong> Her gruptan ilk <strong>${direct}</strong> takım direkt çıkar.
            ${wildcards > 0 ? `Tüm grupların 3.'leri arasından en iyi <strong>${wildcards}</strong> takım da çıkar.` : ''}
            <div class="qualify-legend">
                <span class="q-green">🟢 Direkt çıkar</span>
                ${wildcards > 0 ? '<span class="q-yellow">🟡 Joker ile çıkabilir</span>' : ''}
            </div>
        </div>`;

        html += `<table class="standings-table">
            <thead><tr>
                <th>#</th><th>Takım</th><th>O</th><th>G</th><th>M</th>
                <th title="Kazanılan Set">KS</th><th title="Kaybedilen Set">MS</th>
                <th title="Set Averajı">Avg</th><th>P</th>
            </tr></thead><tbody>`;

        st.forEach((t, i) => {
            const isDirect = i < direct;
            const isWild = false;
            const rc = i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':'';
            const qc = isDirect?'qualified-row':'';
            const badge = isDirect?' 🟢':'';
            html += `<tr class="${rc} ${qc}">
                <td><strong>${i+1}</strong></td>
                <td>${t.team}${badge}</td>
                <td>${t.played}</td><td>${t.won}</td><td>${t.lost}</td>
                <td>${t.sw}</td><td>${t.sl}</td>
                <td>${t.avg > 0 ? '+' : ''}${t.avg}</td>
                <td><strong>${t.pts}</strong></td>
            </tr>`;
        });

        html += `</tbody></table>
            <p style="color:#999;font-size:0.78em;margin-top:8px;">
                O:Oynanan &nbsp; G:Galibiyet &nbsp; M:Mağlubiyet &nbsp; KS:Kazanılan Set &nbsp; MS:Kaybedilen Set &nbsp; Avg:Set Averajı &nbsp; P:Puan<br>
                Puanlama: 3-0/3-1 kazanma → 3P &nbsp;|&nbsp; 3-2 kazanma → 2P &nbsp;|&nbsp; 2-3 kaybetme → 1P &nbsp;|&nbsp; 0-3/1-3 kaybetme → 0P
            </p>`;

        document.getElementById('standings-container').innerHTML = html;
    }

    else if (section === 'fikstur') {
        buildGroupTabs('fixtures-group-tabs', section, groups, true);

        // Final Four seçiliyse bracket göster
        if (activeGroups[section] === '__playoff__') {
            document.getElementById('fixtures-container').innerHTML = renderBracket(data.playoffs||[]);
            return;
        }
        const ms = (data.matches||[]).filter(m => m.group === g);
        if (!ms.length) { document.getElementById('fixtures-container').innerHTML = '<p class="empty-msg">Bu grupta henüz maç eklenmemiş.</p>'; return; }
        document.getElementById('fixtures-container').innerHTML = ms.map(m => `
            <div class="fixture-card">
                <div class="fixture-meta">
                    <span class="fixture-badge">📅 ${m.date}</span>
                    ${m.time ? `<span class="fixture-badge">🕐 ${m.time}</span>` : ''}
                    ${m.venue ? `<span class="fixture-badge salon">📍 ${m.venue}</span>` : ''}
                </div>
                <div class="fixture-teams">
                    <span class="fixture-team">${m.team1}</span>
                    <span class="fixture-vs">vs</span>
                    <span class="fixture-team right">${m.team2}</span>
                </div>
            </div>`).join('');
    }

    else if (section === 'sonuclar') {
        buildGroupTabs('results-group-tabs', section, groups, true);

        // Final Four seçiliyse playoff sonuçlarını göster
        if (activeGroups[section] === '__playoff__') {
            document.getElementById('results-container').innerHTML = renderPlayoffResults(data.playoffs||[]);
            return;
        }
        const played = (data.matches||[]).filter(m => m.group === g && m.played);
        if (!played.length) { document.getElementById('results-container').innerHTML = '<p class="empty-msg">Bu grupta henüz oynanmış maç yok.</p>'; return; }
        document.getElementById('results-container').innerHTML = played.map(m => {
            const setList = m.sets ? m.sets.split(',').map(s => s.trim()).filter(Boolean) : [];

            // Setleri kazanana göre ayır
            let leftSets = [], rightSets = [];
            setList.forEach((s, i) => {
                const parts = s.split('-');
                const a = parseInt(parts[0])||0, b = parseInt(parts[1])||0;
                const box = `<div class="set-box"><span class="set-label">Set ${i+1}</span><span class="set-score">${s}</span></div>`;
                if (a >= b) leftSets.push(box); else rightSets.push(box);
            });

            const leftHtml  = leftSets.length  ? leftSets.join('') : '';
            const rightHtml = rightSets.length ? rightSets.join('') : '';

            return `<div class="result-card">
                <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:6px;">
                    <span class="result-team">${m.team1}</span>
                    <span class="result-score">${m.score1} – ${m.score2}</span>
                    <span class="result-team right">${m.team2}</span>
                </div>
                ${setList.length ? `<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:4px;margin-top:8px;">
                    <div style="display:flex;flex-wrap:wrap;gap:6px;flex:1;">${leftHtml}</div>
                    <div style="min-width:20px;flex-shrink:0;"></div>
                    <div style="display:flex;flex-wrap:wrap;gap:6px;flex:1;justify-content:flex-end;">${rightHtml}</div>
                </div>` : ''}
            </div>`;
        }).join('');
    }
}


const ROUNDS = [
    { key: "SF", label: "Yari Final",   short: "YF" },
    { key: "F",  label: "Final",        short: "F"  },
    { key: "TP", label: "3. luk Maci",  short: "3." }
];




function renderPlayoffResults(playoffs) {
    const played = playoffs.filter(m => m.played);
    if (!played.length) return '<p style="text-align:center;color:#888;padding:40px;">Henüz oynanmış üst tur maçı yok.</p>';

    const ROUND_ORDER = ['SF','F','TP'];
    const ROUND_NAMES = { SF:'Yarı Final', F:'Final', TP:'3. luk Maci' };

    let html = '';
    ROUND_ORDER.forEach(r => {
        const ms = played.filter(m => m.round === r);
        if (!ms.length) return;
        html += `<div style="margin-bottom:8px;"><span style="background:#8B0000;color:#FFD700;padding:4px 14px;border-radius:6px;font-size:0.82em;font-weight:800;">${ROUND_NAMES[r]}</span></div>`;
        ms.forEach(m => {
            const sets = m.sets ? m.sets.split(',').map(s=>s.trim()).filter(Boolean) : [];
            let leftSets = [], rightSets = [];
            sets.forEach((s,i) => {
                const parts = s.split('-');
                const a=parseInt(parts[0])||0, b=parseInt(parts[1])||0;
                const box = `<div class="set-box"><span class="set-label">Set ${i+1}</span><span class="set-score">${s}</span></div>`;
                if (a>=b) leftSets.push(box); else rightSets.push(box);
            });
            const lHtml = leftSets.length ? `<div class="sets-grid">${leftSets.join('')}</div>` : '';
            const rHtml = rightSets.length ? `<div class="sets-grid">${rightSets.join('')}</div>` : '';
            html += `<div class="result-card" style="margin-bottom:14px;">
                <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:6px;">
                    <span class="result-team">${m.team1||'TBD'}</span>
                    <span class="result-score">${m.score1} – ${m.score2}</span>
                    <span class="result-team right">${m.team2||'TBD'}</span>
                </div>
                ${sets.length ? `<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:4px;margin-top:8px;">
                    <div style="display:flex;flex-wrap:wrap;gap:6px;flex:1;">${lHtml}</div>
                    <div style="min-width:20px;flex-shrink:0;"></div>
                    <div style="display:flex;flex-wrap:wrap;gap:6px;flex:1;justify-content:flex-end;">${rHtml}</div>
                </div>` : ''}
            </div>`;
        });
    });
    return html;
}

function makeBTeam(name, score, isWinner) {
    const bg = isWinner ? 'background:rgba(255,215,0,0.25);' : '';
    const fw = isWinner ? 'font-weight:800;color:#8B0000;' : 'font-weight:600;';
    const nameStyle = name ? fw : 'color:transparent;';
    return `<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 14px;min-height:40px;${bg}">
        <span style="font-size:0.85em;flex:1;line-height:1.3;${nameStyle}">${name||'—'}</span>
        <span style="font-size:0.9em;font-weight:800;color:#8B0000;min-width:18px;text-align:right;padding-left:6px;">${score!==null&&score!==undefined&&name?score:''}</span>
    </div>`;
}

function makeBMatchInline(m) {
    const boxStyle = 'background:white;border-radius:10px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.1);border:2px solid';
    if (!m) {
        return `<div style="${boxStyle} #eee;">
            <div style="padding:10px 14px;min-height:40px;border-bottom:1px solid #f0f0f0;"></div>
            <div style="padding:10px 14px;min-height:40px;"></div>
        </div>`;
    }
    const played = m.played;
    const s1 = parseInt(m.score1), s2 = parseInt(m.score2);
    const w1 = played && s1>s2, w2 = played && s2>s1;
    const border = played ? '#FFD700' : '#e5e5e5';
    const t1 = m.team1 || '';
    const t2 = m.team2 || '';

    // Meta bilgi (tarih, saat, salon)
    const metaParts = [m.date, m.time, m.venue].filter(Boolean);
    const metaHtml = metaParts.length ? `<div style="background:#f9f9f9;padding:6px 12px;font-size:0.72em;color:#666;border-bottom:1px solid #f0f0f0;display:flex;flex-wrap:wrap;gap:6px;">
        ${m.date ? `<span>📅 ${m.date}</span>` : ''}
        ${m.time ? `<span>🕐 ${m.time}</span>` : ''}
        ${m.venue ? `<span>📍 ${m.venue}</span>` : ''}
    </div>` : '';

    return `<div style="${boxStyle} ${border};">
        ${metaHtml}
        ${makeBTeam(t1, played&&t1?s1:null, w1)}
        <div style="border-top:1px solid #f0f0f0;">${makeBTeam(t2, played&&t2?s2:null, w2)}</div>
    </div>`;
}

function renderBracket(playoffs) {
    if (!playoffs) playoffs = [];
    // Boşsa Final Four şablonu: 2 SF + 1 Final + 1 TP (QF yok)
    const hasAnyRound = playoffs.some(m => ['SF','F','TP'].includes(m.round));
    if (!hasAnyRound) {
        const empty = (r) => ({ round:r, played:false, team1:'', team2:'', score1:null, score2:null, sets:'' });
        playoffs = [ empty('SF'), empty('SF'), empty('F'), empty('TP') ];
    }

    const qf = []; // Final Four'da QF yok
    const sf = playoffs.filter(m => m.round==='SF');
    const fn = playoffs.filter(m => m.round==='F');
    const tp = playoffs.filter(m => m.round==='TP');

    let champion = '';
    if (fn.length && fn[0].played) {
        const f=fn[0]; champion = parseInt(f.score1)>parseInt(f.score2)?f.team1:f.team2;
    }

    const sfL=sf[0]||null, sfR=sf[1]||null, finalM=fn[0]||null;

    const col = 'flex:1;min-width:160px;display:flex;flex-direction:column;gap:10px;padding:0 10px;';
    const colC = 'flex:1;min-width:180px;display:flex;flex-direction:column;align-items:center;gap:10px;padding:0 10px;';
    const rl = (txt) => `<div style="text-align:center;font-size:0.75em;font-weight:800;color:#8B0000;text-transform:uppercase;letter-spacing:1px;padding:6px 4px;border-bottom:2px solid #FFD700;margin-bottom:6px;">${txt}</div>`;

    const centerBox = `<div style="background:linear-gradient(135deg,#8B0000,#6B0000);border-radius:14px;padding:18px 12px;text-align:center;box-shadow:0 6px 20px rgba(139,0,0,0.3);width:100%;">
        <div style="font-size:2.2em;margin-bottom:6px;">🏆</div>
        <div style="color:#FFD700;font-size:0.75em;font-weight:800;text-transform:uppercase;letter-spacing:1px;">Şampiyon</div>
        <div style="color:#FFD700;font-size:1em;font-weight:800;margin-top:8px;min-height:22px;">${champion||'<span style=\'opacity:0.35;font-style:italic;font-size:0.85em;\'>Bekleniyor</span>'}</div>
    </div>`;

    let html = `
    <div style="text-align:center;margin-bottom:20px;">
        <span style="font-size:1.4em;font-weight:800;color:#8B0000;letter-spacing:1px;">🏆 FINAL FOUR</span>
    </div>
    <div style="overflow-x:auto;padding-bottom:10px;">
    <div style="display:flex;gap:0;align-items:center;min-width:400px;padding:10px 0;">

        <div style="${col}">
            ${rl('Yarı Final')}
            ${makeBMatchInline(sfL)}
        </div>

        <div style="color:#FFD700;font-size:1.5em;padding:0 4px;align-self:center;">›</div>

        <div style="${colC}">
            ${rl('Final')}
            ${centerBox}
            <div style="margin-top:8px;width:100%;">${makeBMatchInline(finalM)}</div>
        </div>

        <div style="color:#FFD700;font-size:1.5em;padding:0 4px;align-self:center;">‹</div>

        <div style="${col}">
            ${rl('Yarı Final')}
            ${makeBMatchInline(sfR)}
        </div>

    </div>
    </div>`;

    if (tp.length) {
        let third = '';
        if (tp[0].played) { const t=tp[0]; third=parseInt(t.score1)>parseInt(t.score2)?t.team1:t.team2; }
        html += `<div style="margin-top:20px;padding-top:16px;border-top:2px dashed #eee;">
            <div style="font-size:0.8em;color:#888;font-weight:700;text-align:center;margin-bottom:10px;text-transform:uppercase;">3.lük Maçı ${third?'— 3. Olan: '+third:''}</div>
            <div style="max-width:320px;margin:0 auto;">${makeBMatchInline(tp[0])}</div>
        </div>`;
    }

    return html;
}


function renderAll(data) {
    globalData = data;
    ['takimlar', 'puan-durumu', 'fikstur', 'sonuclar'].forEach(s => renderSection(s, data));
}

window.addEventListener('load', () => {
    database.ref('turnuva').on('value', snap => {
        const data = snap.val();
        if (!data) return;
        if (data.matches && !Array.isArray(data.matches)) data.matches = Object.values(data.matches);
        else if (!data.matches) data.matches = [];
        if (data.playoffs && !Array.isArray(data.playoffs)) data.playoffs = Object.values(data.playoffs);
        else if (!data.playoffs) data.playoffs = [];
        renderAll(data);
    });
});
</script>
</body>
</html>
